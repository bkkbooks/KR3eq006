body:
  text: 卷下燥論至直大要論列病機一十九條而遺漏燥證為其兼乎風熱之化故但言風熱而燥在其中矣河間特補此義於原病式中然義有未悉敢再陳之夫燥兼風化者經云風能勝濕濕去則燥自生始因風甚而燥及於肺則木氣有餘侮所不勝而金更微邪復因燥甚而病及乎肝則木氣亢害承者制之而金行報復故筋脈徑強口噤風癇皮膚燥屑收斂急切之病生矣燥兼熱化者熱即火也易曰燥萬物者莫熯乎火始由真陰耗竭致有剋金之火而燥乃成金受邪不能生制火之水而燥益甚故消穀善飢噎膈胃枯二便閉塞燥烈枯涸等證生矣由熱生風由風生燥燥又生熱循環勝復至於髓液咸枯燥非淺患明矣臻燥之因或遇陽膽司天燥化大行或久勞於風日之中頻邇於火燥之畔外因也七情不節神傷血耗及大病吐汗下克伐太過亡其津液內因也食味辛熱過多虛勞誤投溫補與夫服食家金石之劑發燥不內外因也凡此諸論皆令熱極生風風火相煽陰中伏火煎熬津液而燥證深矣是以燥在外皮膚皺揭疥癢爪枯燥在中脾胃乾涸消穀善飢燥在上則鼻燥咽乾燥在下則便難癃閉兼熱則手足痿兼風則痙癇作虛而燥熱必致勞咳實而燥熱必見癲狂挾痰食者終為噎膈等證治燥之法當觀沸釜之理以血喻湯而氣喻火也若火猛湯沸當沃薪滅火不使絶竭猶用芩連梔膏朴硝大黃大苦至寒治標等劑清降火邪則血不為衰而燥不為甚也若沸久將干又將添益新水使能勝火猶用地黃門冬參耆歸芍甘寒甘溫治本之劑氣血雙補則燥得所潤而火有所制也昔賢云休治風休治燥治得火時風燥了然則獨無寒燥者乎嘗考醫壘元戎有五方治燥諸法元北方其脈遲寒燥也宜溫熱藥治之如桂附硫黃良薑巴豆之屬是知燥亦兼寒張景嶽論消渴亦云陽勝固能消陰陰勝獨不能消陽乎經云移寒於肺為肺消飲一溲二死不治之證曾以八味丸歸脾湯治一縉紳得愈又如大便燥結有系臟寒則血枯臟冷則氣澀食少脈微為陰結者宜半硫丸香附湯治之夫消渴閉結燥證之大者乃有屬於陰寒海藏非鑿說矣知常識變圓妙無窮始得不愧為司命火論火之為病其害甚大其勢生彰其死甚暴何者蓋能燔灼焚焰飛走狂越銷鑠萬物莫能過之遊行於三焦虛實之兩途故凡動皆屬火化火不妄動隨觸而發夫人在氣交之中多動少靜欲無觸發可得乎火一妄行元氣更傷動之極也遂與元氣不兩立經云一水不能勝二火之火出於天造曰君火人火也曰相火龍火雷火也經所謂一水不勝五火之火出於人為蓋大怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀動中則火起於肺心為君主自焚而死此五志厥陽之火也又考內經病機一十九條而屬火者五可見火熱致病者甚多然五志之火詳於河間君相二火辨自丹溪可謂無漏義矣其見之於證也上為喘嘔吐酸吐血衄血氣逆膹脹瞀瘈冒昧喉痹耳鳴等證下為暴注下迫下血溺血小便淋瀝大便閉結霍亂轉筋等證或為瘡腫癰疽寒熱戰栗擾躁狂越證見於外或為悲哭譫妄驚悸怔忡骨蒸咳嗽證發於內凡諸火邪不一而足其形之於脈也浮而洪數為虛火沉而實大為實火見於兩寸為上焦之火心肺是也見於兩關為中焦之火脾胃肝膽是也見於兩尺為下焦之火腎與膀胱是也滑數而舉按皆有力真火也浮而重按全無假火也其藥之所主也君火可以經伏可以水滅可以直折黃連之屬可以制之相火不可以水折當從其性而伏之惟黃柏之屬可以降之然黃連瀉心火黃芩瀉肺火芍藥瀉脾火柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有形之火耳若飲食勞倦內傷元氣之火宜以甘溫之劑除之如陽亢陰微煎熬血液之火宜以甘寒之劑降之如門冬地黃之屬若左腎真陰失守而火熾則地黃元參之類可以壯水制陽若右腎命門虛弱火衰則桂附之類可以消陰益火若胃虛過食冷物抑遏陽氣於脾土之中則升麻葛根可以升散鬱火不明此類而求治火病未免實實虛虛之誤矣痰論痰之為病仲景論四領六證無擇敘內外三因俱為切當蓋四領則敘因痰而顯諸證者三因則論因有所傷而成痰者也惟王隱君論人之諸疾悉出於痰此發前人所未論可謂深識痰之情狀而得其奧者矣制滾痰丸一方總治斯盛固為簡便較之仲景無擇有表裡內外而分汗下溫利之法則疏闊矣況又有虛實寒熱之不同哉夫痰之為病有因熱而生痰者熱則熏蒸津液而成痰亦有因痰而生熱者痰則阻礙氣道而生熱有因風寒火熱而得者有因驚而得者有因氣而得者有因飲酒而得者有因食積而得者有脾虛不能運化而生者有腎虛水泛為痰者風痰多成中風癱瘓奇證寒痰多成冷痹骨痛火痰多成煩熱喘嗽濕痰多成倦怠嗜臥驚痰多成心痛癲癇氣痰多成胸腹膨脹酒痰多成嘔吐泄瀉痰飲多成脅滿胸臂痛食積痰多成癖塊痞滿脾虛之痰因勞倦傷脾痰清食少腎虛之痰因房勞傷腎痿冷昏暈然亦有痰冷而屬熱者其為病狀種種難名王隱君論中頗為詳盡學者當察其病形脈證則知所挾之邪隨其表裡上下虛實治之可也大凡病久淹留卒不致死者多因食積痰飲所致此何以故蓋胃氣亦賴痰積所養飲食雖少胃虛猝不便虛故也亦有治痰用峻利藥過多則脾氣愈虛津液不運痰反生而愈甚法當補胃清中氣則痰自然運下此法之本也咳嗽要論咳嗽必由於肺而內經則曰五臟六腑皆令人咳是不獨在肺矣蓋痰有內傷外感之分故自肺而傳及五臟者有之自五臟而傳及於肺者亦有之如風寒暑濕傷於外則必先中於皮毛皮毛為肺之合而受刑不解此則自肺而復傳於諸臟也勞欲情志傷於內則臟氣更傷先由陰分而病及上焦此則自臟而傳於肺也但自表而入者其病在陽故必自表而出之治法宜辛宜溫求其屬而散去外邪則肺氣清而咳自愈矣自內而生者傷於陰也陰虛於下則陽浮於上水涸金枯則肺苦於燥肺燥則癢癢則咳不能已治此者宜甘以養陰潤以養肺使水壯氣復而肺自寧也大法治表邪者藥不宜靜靜則留滯不靜久則必變生他病故最忌寒涼收斂之劑如五臟生成篇所云肺欲辛者此也治里證者藥不宜動動則虛火不寧真陰不復燥癢愈增病必日甚故最忌辛香助陽等劑如宣明五氣篇所云辛走氣氣病無多食辛者此也然表者雖宜動動以散邪若形病俱虛者又當補中而以和解倘專於發散恐肺益弱腠理益疏邪乘虛入病反增劇也治里者雖宜靜以養陰若命門火衰不能歸元則參耆桂附在所必用否則氣不化水終無補於陰也至若因於火者宜清因於濕者宜利因痰者降其痰因氣者理其氣雖方書所載條目極多求其病本則惟風寒勞損二者居其八九風寒者責在陽實勞損者責在陰虛此咳證之綱領其他治標之法亦不過隨其所見之證調之而已至於老人久咳則元氣既虛本難全愈多宜溫養脾肺或兼治標但保其不至羸困則善矣觀者詳之虛勞論天士改按內經之言虛勞惟是氣血兩端至巢氏病源始分五臟之勞七情之傷甚至分六極三十二蒸本事方更分傳尸鬼疰至於九十九種其鑿空附會重見復出固無論已且使學者感於多歧伊誰之咎乎蓋以內經為式第以脾腎分主氣血約而該確而可守也夫人之虛不屬於氣即屬於血五臟六腑莫能外焉而獨居脾腎者水為萬物之元土屬萬物之母二臟安和一身皆治百病不生夫脾具土德脾安則土為金丹金實水深且土不陵水水安其位故脾安則腎愈安也腎兼水火腎安則火不挾肝上泛而凌土濕火能益土運行而化精微故腎安則脾愈安也孫思邈云補脾不如補腎許學士云補腎不如補脾兩先生深知二臟為生人之根本又知二臟有相贊之功能故其說似背其旨實同也救腎者必本於陰血血主濡之血屬陰主下降虛則上升當斂而抑六味丸是也救脾者必本於陽氣氣主煦之氣為陽主上升虛則下陷當升而舉也補中益氣湯是也近世治勞專以四物湯加知柏不知血藥常滯非痰多食少所宜血藥常潤久行必至滑腸且知柏性苦寒能瀉實火名曰滋陰其實燥而損血且苦先入心久而增氣反能助火至其敗胃所不待言丹溪有言實火可瀉虛火可補勞證之火虛乎實乎瀉之可乎矯其遍者輒以桂附為家常茶飯此惟火衰者宜之若氣血燥實之人能無助火為害哉大抵虛勞之證疑難不少如補脾補肺法當兼行然脾喜溫燥肺喜清潤保肺則礙脾補脾則礙肺惟熱燥而甚能食而不瀉者潤肺當急而補脾之藥不可厥也倘虛羸而甚食少瀉多者雖喘嗽不寧但以補脾為急而潤肺之藥宜戒矣常見勞證之死多死於泄瀉泄瀉之因多因於清潤司命者能不為之兢兢耶又如補腎補脾法當兼行然方欲以甘寒補腎其人減食又恐不利於脾方欲以辛溫快脾其人陰陽又恐愈耗其水兩考衡量而較重脾者以脾土上交於心下交於腎也若腎大虛而勢危篤又不可拘執當隨時參活法耳前哲有言土旺而金生勿拘拘於保肺水壯而火熄毋汲汲於清心可謂洞達內經之旨深窺根本之治者也吐血三要論凡治吐血宜降氣不宜降火宜行血不宜止血宜補肝不宜伐肝何謂宜降氣不宜降火也氣有餘便是火氣降則火降火降則氣不上升血隨氣行無濫出上竊之患矣降火必用寒涼之劑反傷胃氣胃氣傷則不能統血血愈不能歸經矣今之療吐血者大患有二一則專用寒涼如芩連山梔青黛柿餅灰四物湯加知柏之類往往傷脾作泄以致不救一則專用人參以致肺熱使肺愈傷咳逆愈甚亦有用參而獲效者此是氣虛嗽咳氣屬陽不由陰虛火熾所致然亦百不一二也宜以白芍炙甘草制肝枇杷葉麥冬橘紅貝母薄荷清肺米仁山藥養脾韭菜降香蘇子下氣青蒿鱉甲銀柴胡地骨皮補陰清熱棗仁茯神養心地黃山萸枸杞牛膝補腎此屢試輒驗之方然陰無驟補之法非多服不效病家欲速其功醫者張皇無主百藥雜試以致隕命覆轍相尋而不悟悲夫何謂宜行血不宜止血也血不循經絡者氣逆上壅也夫血得熱則行得寒則凝故降氣行血則血循經絡不求止而自止矣若有意止血則血凝血凝則必發熱惡食及胸脅痛病日沉痼矣何謂宜補肝不宜伐肝也經曰五臟者藏精氣而不瀉者也肝為將軍之官主藏血吐血者肝失其職也養肝則肝氣平而血有歸伐之則肝虛不能藏血血愈不止矣此三者乃余獨得之要當為斯世告之諸血病論經云榮者水穀之精氣也調和於五臟灑陳於六腑乃能入於脈也源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎灌溉一身出入升降皆有所使故目得之而能視耳得之能聽手得之而能攝掌得之而能握足得之而能步苟調養未周而內動於相火外傷於寒熱則氣血亂其常度而病生矣凡陽盛陰虛有升無降血隨氣升越出上竅則上見於鼻故鼻中出者為衄血以鼻竅通於腦火上衝於腦又肺竅通於鼻火內炎其金也口中出者為吐血又有嘔血咯血咳血嗽血之不同焉吐血者血雖出而無聲一吐輒以升計甚至鬥許而色頓白舉體懈惰乃陽明胃經之火上逆證雖極陰而實易治以邪淺在腑未動臟陰又陽明為氣血俱多之經故也嘔血者血每出則先有嘔逆聲其血必紫黑成塊脅痛內熱氣塞煩悶乃肝厥陰經之火或盛怒不和所致急宜降氣清火以肝為牝藏為納血之海其氣最宜靜固一有不寧則衝脈騰沸譬如大海生濤未有不拍天而撼島者倘遷延不治必至上湧不止而死矣咯血者每血出喉中先癢癢則所咯皆血其血或鮮或紫或兼有痰口燥嗌乾心虛驚悸乃手少陰君火太盛或夏月暑熱傷心所致宜清心降火若由於情思者又宜於自己消息之苟患是而一任其縱橫雖瓊漿玉醴其如心病何哉咳血者其證必先病咳嗽咳之不已復有鮮血即世所謂虛勞之證或痰內有紅絲是為肺痿皆陰精虧損陽火亢極銷鑠肺金所致患此必十死八九最為難治嗽血者素未嘗病咳而又無咳逆聲但痰嗽則必有血四肢無力或兼泄瀉乃鬱結傷脾或久坐臥傷氣所致宜培補真元雖人參煨姜亦可選用惟忌苦燥以苦傷陽而燥傷陰也唾血者每有鮮血必隨唾而出骨蒸內熱乾咳肌瘦乃腎水枯涸火反內淫或入房太甚陰虛火盛所致與肺病咳血同為危候治此者必曲盡其術天始克旋毋專恃功於知藥也又血從齒齦出謂之牙宣胃與腎之火也血從汗孔出謂之肌衄從舌出謂之舌衄心與肝之熱也此皆血之見於上者也其病於下在大便則有腸風臟毒滯下便紅之殊在小便則有赤淋溺血帶下崩中之異腸風者其人本腸胃蓄熱熱則生風或邪氣外入滲透腸間其血來色必清淡藏毒者喜食膏粱過耽醇醴或偏服熱藥蘊毒臟腑也其血來必渾濁滯下之由多由濕蒸熱瘀故必膿血相雜裡急後重便紅之病多由脾虛先統故但有血而無膿澼澼作聲赤淋則溺管澀痛法宜清利溺血便是溺中見紅法當涼解帶下者經水淋漓如帶不斷之謂崩中者血下崩騰妄行不止之稱二者於婦人多有之此皆血病之見於下者也其病於內則熱勝於陰必發瘡瘍濕滯於血必發痛癢癮疹凝澀皮毛則為冷痹損壞肌肉則為破傷病於外則跌僕留瘀疼痛寒冷相搏必凝取成瘕蓄於上焦人必喜妄蓄於下焦人必如狂此又血證之見於內外者也先哲云血貴寧靜不喜疏動疏動則有泛溢之虞又云血宜流通不當凝滯凝滯則有瘀著之慮人苟能善調其營靜而不至於凝通而不至於動則經脈流行皮膚潤澤筋骨強徑關節清利矣又何有以上數者之病哉內傷余議嘗觀東垣內外篇辨曰外傷風寒客邪有餘之病當瀉不當補內傷飲食勞役不足之病當補不當瀉自此議一出而天下後世知內傷外感之有別而仲景之法不可例用其惠也不亦大哉然夷考其說猶或有可疑者僭用條之如曰飲食勞倦傷而內熱者乃陰火乘其坤土之位故內熱極乎胸中又曰經云勞者溫之損者溫之惟宜溫藥以補元氣而瀉火邪又云甘溫能除大熱又曰飲者無形之氣傷之則宜發汗利小便使上下分消其濕食者有形之物傷之則宜損其谷其次莫如消導若此者皆不能使人無疑者也謹按調經論曰陰虛生內熱奈何歧伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱嗟呼此內傷之說之源乎請釋其義如左夫人身之陰陽有以表裡言者有以氣血言者有以臟腑言者如上下前後升降呼吸之類甚多不必悉舉此所謂陰虛之陰其所指數者皆不同蓋勞動之過則陽和之氣亢極而為火矣況水穀之味又少入是故陽愈甚而陰愈衰此陰虛之陰蓋指身中之陰氣與水穀之味耳或以下焦陰分為言或以腎水真陰為言皆非也夫有勞役者過動皆火也形氣衰少者壯火食氣也穀氣不盛者勞傷元氣則食少而氣衰也上焦不行者清陽不升也下脘不通者濁陰不降也夫胃受水穀故清陽升而濁陰降以傳化出入滋榮一身今胃不納穀而穀氣衰少則清無升而濁無降矣故曰上焦不行下脘不通然非謂絶不行不通也但比之尋常無病時則謂之不行不通耳上不行下不通則鬱矣鬱則少火皆成壯火而胃居上焦下脘之間故胃氣熱熱則上炎故熏胸中而內熱也東垣固宜引此段經文以為內傷發熱之本乃反不引而謂陰火乘其土位故內熱及胸中此不能無疑者也夫陰火二字素難未嘗言而東垣每每言之素問止有七節之旁中有小心二句而守真推其為命門屬火不屬水引仙經心為君火腎為相火以為證然亦不以陰火名之是則名陰火者其東垣始歟竊謂內熱之作非皆陰火但氣鬱則成熱耳雖曰心為君不主事然內經所敘諸病之屬熱者甚衆豈君火不能為病而直欲純歸之陰火乎至真大要論曰勞者溫之損者益之夫勞則動之大過而神不寧矣故溫之溫之者養也所謂調其飲食適其起居澄心息慮從容以待其真氣之復也禮記所謂柔色以溫之即是此義今東垣乃以溫涼之溫謂宜溫藥以補元氣之虛而瀉火邪又易損者益之為損者溫之又以溫能除大熱為內經之言而遍考內經並無此論此亦不能無疑者也然溫藥之補元氣瀉火邪亦惟氣溫而味甘者斯可矣養溫能益氣甘能助脾而緩火故元氣復而火邪息也夫宜用溫藥以為內傷不足之治則可以為勞者溫之之證則不可陰陽應象論所謂形不足者溫之以氣其溫字亦是滋養之義非指藥也夫形不足乃陽虛而不充也氣者藥之氣也藥有氣厚氣薄味厚味薄味厚者屬陰而滋精氣厚者屬陽而滋形今以藥氣厚者滋陽不兼形乎故曰形不足者溫之以氣雖以藥溫養之亦未嘗不兼乎調飲食適起居與澄心息慮者也溫字固具二義然終不可視為溫涼之溫苟以補之除之抑之舉之散之等語比類而推焉則其義自著矣夫五行運於天則無形質可觀其麗於地則有形質矣金木水土有形有質者矣火者有形而質不實者也酒性雖熱體同於水今東垣乃謂飲者無形之氣此又不能無疑者也既待發汗利小便以去之其可謂之無形之氣乎且勞倦傷飲食傷二者雖俱為內傷然不可混而為一難經云飲食勞倦則傷脾蓋謂脾主飲食而四肢亦屬脾故飲食失節勞役四肢皆能傷脾非謂二者同類而無辨也夫勞倦傷飲食傷雖與風寒暑濕有餘之病不同然飲食傷比之勞倦傷又不同者誠當於不足之中更觀其有餘不足也夫飢渴不飲食者胃氣空虛則為不足固失節也以傷言則不足以停滯言則有餘矣惟其不足故補益惟其有餘故消導亦有物滯氣傷必消補兼行者亦有物暫滯而氣不甚傷獨宜消導者亦有既停滯不復自化不須消導但當補益或亦不須補益者潔古枳朮丸東垣橘皮枳實丸等雖曰消導固有補益之意存乎其間他如木香分氣丸導氣枳實丸雖無補益然施之於物停滯氣不甚傷者豈不可哉但不宜視為通行之藥耳且所滯之物非枳朮之力所能去者安可泥於消導而不知變乎故備急丸感應丸之推逐者潔古東垣亦未嘗委之而弗用也故善將兵者攻亦當守亦當不善將兵者宜攻而守宜守而攻其敗也非兵之罪用兵者之罪耳觀乎此則知消導推逐補益之理矣若夫勞役傷則純乎補益自不待議雖東垣丁寧告戒然世人猶以苦寒之劑望除勞倦內傷之熱及其不愈而反甚自甚而至危但曰病熱已極藥不能勝耳醫者病者一委之天命皆不悟其妄治之失嗚呼仁人君子能不痛心哉夫東垣先哲之出類者也奚敢輕議但嫌白壁微瑕或貽後人毫釐千里之謬故不得不僭陳耳知我者其鑑之五郁六郁解夫郁者閉結凝滯瘀蓄抑遏之總名內經五郁以運氣言也丹溪六郁以病因言也以五郁言之有諸家之釋然張氏之說為得其正其說曰天地有五運之郁人身有五臟之應鬱則結聚不行乃致當升不升當降不降當化不化而鬱作矣故或鬱於氣或鬱於血或鬱於表或鬱於里或因鬱而生病或因病而生郁鬱而太過者宜裁之抑之鬱而不及者宜培之助之大抵諸病皆兼郁為治有不同所謂木鬱達之者達暢達也凡木鬱之病風之屬也其臟應肝膽其經在脅肋其主在筋爪其傷在脾胃在血分其性喜調暢故在表者當疏其經在裡者當疏其臟但使氣得通行皆謂之達諸家以吐為達又安足以盡之火鬱發之發發越也凡火鬱之病為陽為熱之屬也其臟應心主小腸三焦其主在經絡其傷在陰分火之所居有結聚斂伏者不宜蔽遏當因其勢而解之散之升之揚之如開其窗揭其被皆謂之發非止於汗也土鬱奪之奪直取之也凡土鬱之病溫濕之屬也其藏在脾胃其主在肌肉四肢其傷在胸腹土畏壅滯凡滯在上者奪其上吐之可也病在中者奪其中伐之可也病在下者奪其下瀉之可也凡此皆謂之奪非止於下也金鬱泄之者泄疏利也凡金鬱之病為斂為閉為燥為塞之屬也其藏應肺與大腸其主在皮毛聲息其傷在氣分或解其表或破其氣或通其便故在表在裡在上在下皆可謂之泄也水鬱折之者折調製也凡水鬱之病為寒為水之屬也水之本在腎水之標在肺其傷在陽分其反克在脾胃水性喜流宜防泛濫折之之法如養氣可以化水治在肺也實土可以制水治在脾也壯火可以勝水治在命門也自強可以帥水治在腎也分利可以泄水治在膀胱也凡此皆謂之折豈獨抑之而已哉郁有五法亦有五郁去則氣調矣又以六郁言之如氣鬱者必胸腹滿痛其脈沉澀濕鬱者身體重著或關節疼痛遇陰寒即發其脈沉緩痰鬱者動則喘息起臥怠惰其脈沉滑血鬱者四肢無力能食便紅其脈沉芤食鬱者噯酸惡食痞塊腹脹其脈氣口沉緊熱鬱者瞀悶口乾小便淋赤其脈沉數六郁不言風寒者蓋風寒鬱則為熱故也然丹溪又云氣鬱而濕滯濕滯而成熱熱鬱而生痰痰滯而血不行血滯而食不消化是郁雖有六又皆相因為病者也夫治六郁者以越鞠為丸為主方固為盡善但郁者至久元氣未有不傷克伐屢投隨散而隨郁者比比然也於此當顧慮根本權其重輕或攻補兼施使邪衰而正勝或專行於補益俾養正以除邪然郁在氣血者當以有形之藥分氣血以療之醫者之責也若郁在情志者即當以情志解散此無形之氣藥病者所自具也知乎此而立五六之治思過半矣諸氣不當作寒治論捍衛沖和不息之謂氣擾亂妄動變常之謂火當其和平之時外護其表復行於里周流一身循環無端出入升降繼而有常原出中焦總統於肺氣曷常病於人也及其七情之變攻五志之間發乖戾失常清者遽變為濁行者遏抑而反止表失外護而不知里失健捍而少降營運漸遠肺失主持妄動不已五志厥陽之火起焉上熾於肺氣乃為病何者氣本為陽反勝則為火矣河間有曰五志過極皆為火也何後世不本此議而以香辛燥熱之劑概作寒治所據何理且言指迷七氣湯用青皮稜朮益桂之屬可以通七情混同一義不按某藥治某病以下諸方尤有甚焉者茲不具論不知經言九氣之治各有分別如高者抑之下者舉之寒者熱之熱者寒之云云何嘗混作寒論而以燥熱之劑通治諸氣若用燥熱之劑不過暫卻滯氣沖快於一時耳滯氣暫開久而復郁郁至久而生熱熱積久而生痰痰飲下隔升降不行濁氣混濛清虛耗竭此習俗相沿之誤莫能救挽者又有腎虛不能攝氣歸元用黑錫丹養氣丹以有形金石鎮無形之氣譬以石投水水固未嘗沉也豈不殆歟丹溪云上升之氣自肝而出中挾相火其熱為甚自覺冷者非真冷也火極以水陽亢陰微故有此證認假於真可勝道哉大抵七情傷氣鬱結不舒痞悶壅塞發為諸病當詳所起之因滯於何經始則用辛溫以散之稍久即以辛平和之辛寒折之然藥中有行散者有損泄者用之能卻氣之標而不能制氣之本豈可久佐以燥熱之藥以火濟火混同為治使之常服多服可乎氣之與火一理而已動靜之變反化為二氣作火論與病情相得丹溪局方發揮云冷生氣者出於高陽生之謬言也是非身受寒氣口食寒物而遽論寒者吾恐千不得其一二也腫脹引經別證辨腫脹一證經云五臟六腑無不有之再考全經如脈要論曰胃脈實氣有餘則脹病形篇曰胃病者腹腫脹胃脘當心而痛本神篇曰脾氣實則腹脹經溲不利應象論曰濁氣在上則生䐜脹此皆實脹也太陰陽明論曰飲食起居失節入五臟則腹滿閉塞師傳篇曰足太陰之別分孫虛則鼓脹此皆虛脹也經脈篇曰胃中寒則脹滿方宜論曰臟寒生滿病風論曰氣隔塞不通則善脹失衣則善脹皆寒脹也陰陽別論曰二陰一陽發病善脹心滿診要經終篇曰手少陰終者腹脹閉足太陰終者腹脹閉此心脾受傷之脹也此外如六元正紀至真大要等論曰太陰所至為跗腫及土鬱之發太陰之初氣太陰之勝復皆濕勝之腫脹也或曰水運太過寒勝則浮或曰太陰司天太陽勝復皆寒勝之腫脹也或曰少陰司天少陰勝復少陽司天少陰勝復熱勝則腫皆火勝之腫脹也或曰厥陰司天在泉厥陰之復或曰陽明之復皆水邪之侮土及金氣反勝之腫脹由是觀之則不惟五臟六腑即五運六氣亦各有腫脹矣然經有提其綱者曰諸濕腫滿皆屬於脾又曰其本在腎其末在肺皆聚水也又曰腎者胃之關也關門不利故聚水而從其類也可見諸經雖皆有腫脹無不由於脾肺腎者蓋脾土主運行肺金主氣化腎水主五液凡五氣所行之液悉屬於腎五液所行之氣悉屬於肺轉二藏以制水生金者悉屬於脾故腫脹不外乎三經也但陰陽虛實不可不辨大抵陽證多熱熱者必實陰證必寒寒者多虛先脹於內而後及於外者多實先腫於外而後及乎里者多虛小便黃赤大便祕結者多實小便清白大便溏泄者多虛脈滑數有力者多實弦浮微細者多虛形色紅黃氣息長者多實容顏憔悴者聲短促者多虛凡諸實證必以六淫有餘傷其外飲食怒氣傷其內故致氣逆不行三焦壅閉此則多在氣分無處不到故不分部位而多通身浮腫又或氣實於中又為單腹脹急然陽邪急速其至必暴每成於數日之間此惟少壯者多有之但破其急氣利其壅滯則病無不愈此治實之道也若是虛證必以五志積勞酒色過度傷其脾腎日積月纍其來有漸每成於經月之後此多成於中年之外其形證脈氣必有虛寒之候顯然可見非若實證之暴至而邪熱壅結肝氣悍逆之有因也則治實恆易理虛頗難耳然虛有在氣者有在水者在氣者以脾氣虛寒不能運化所謂氣滿中虛者在水者以脾虛不能制水則寒水反侮脾土泛濫為邪其始也必從陰分漸次而升按肉如泥腫有界分所謂水膨水脹者也然水雖制於脾實則統於腎蓋腎本水藏而元陽生氣所由出若腎中陽虛則命門火衰既不能自制陰寒又不能溫養脾土陰陽不得其正則化而為邪矣夫氣即火也精即水也氣之與水本為同類但在化與不化耳故陽旺則化精而為氣陽衰則不化而為水即為邪凡火盛水虧則病燥水盛火虧則病濕故火不能化則精不從陽而精化為水所以水腫之證多屬陽虛故曰寒脹多熱脹少也然觀丹溪之治腫脹云清濁相混隧壅閉而為熱熱留為濕濕熱相生遂成腫滿治宜補其肝又須養肺金以制木使脾無邪賊之患滋腎水以制火使肺得清化之權夫制火可以保金獨不慮其害土乎若以此法施於陽實而熱者則可若以治陽虛而氣弱者豈不反助陰邪而益其病哉更有不明虛實專執下則脹已之一法雖得少寬於一時真氣愈衰未幾而腫脹再作遂至不救殊可嘆也余於此證察其實者直清陽明反掌收功苟涉虛者溫補肝腎漸次康復或虛實混淆陰陽疑似者寧先以治不足之法探治有餘若不投而病反加者不宜補也不妨易轍自無大害若誤以治有餘之法治不足而曾經峻攻者真氣復傷雖神丹不能療矣其有不大虛不大實者先以清利見攻繼以補中調攝此治虛之道也又有標實而本虛者瀉之不可攻之無功極為危險在病名有鼓脹與蠱脹之殊鼓脹者中空無物皮膚繃急多屬於氣蠱脹者中實有物腹形充大非蠱即血也在女科有氣分血分之殊氣分者心胸堅大而病發於上先病水腫而後經斷血分者血結胞門而病發於下先因經斷而後水腫在治法有理肺理脾之殊先喘而後脹治在肺先脹而後喘治在脾以上諸治其大略也貴在神而明之庶可免於虛虛實實之害矣腹脹禁用攻瀉論從來腫病遍身頭面俱腫尚易治若只單單腹腫則為難治此其間有所以然之故不可不辨也蓋傳世諸方皆是悍毒急攻之法耗損真元虧傷脾胃可一而不可再用藥縱取效於一時倘再腹腫則更無法可用矣且遍身俱腫者五臟六腑各有現證故瀉肝瀉肺瀉膀胱大小腸之藥間有取效之時而單單腹脹則中州之地久窒其四運之軸而清者不升濁者不降互相聚結牢不可破實因脾氣衰微所致而瀉脾之藥尚敢漫用乎且腫病之可瀉者但可施之西北盛壯之人及田野農夫之流豈膏粱老少之所能受設謂腫病概可用之大滿大實必從乎瀉而病後腫與産後腫亦將瀉之耶且古方原載腫病五不治唇黑傷肝缺盆平傷心臍突傷脾背平傷肺足底平傷腎此五者不可治矣是其立方之意非皆為不可治之證而設後人不察概從攻瀉者何耶所以凡用劫奪之藥者其始非不遽消其後攻之不消矣其後再攻之如鐵石矣不知者觀之方謂何物邪氣若此之盛自明者觀之不過為猛藥所攻而致覺此身之元氣轉於此身為難者直有驅良民為寇之弊所謂亦子盜兵弄於潢池亶其然乎明乎此則有培養一法補益元氣是也則有招納一法升陽舉氣是也則有解散一法開鬼門潔淨府是也三法俱不言瀉而瀉在其中矣無餘蘊矣喘脹標本論喘脹二因皆小便不利喘則必生脹脹則必生喘但證有先後之殊而復有標本之異可得而辨焉何則先喘而後脹者生於肺先脹而後喘者生於脾蓋肺金司降外主皮毛經曰肺朝百脈通調水道下輸膀胱是小便之行由於肺氣之降下而輸化也若肺受邪而上喘則失降下之令故小便漸短以致水溢皮膚而生腫滿焉此則喘為本而脹為標也脾土惡濕外主肌肉土能剋水若脾土受傷不能制水則水濕妄行漫漬肌肉水既上溢則邪反侵肺氣不得降而生喘矣此則脹為本而喘為標也屬肺者當清金降氣而行水次之屬脾者當實脾行水而清金次之苟肺證而用燥脾之藥則金得燥而喘愈加脾病而用清金之藥則脾得寒而脹愈甚矣治喘脹者但知實脾行水不知分別脾肺先後之證故為發明之喘哮短氣氣逆息賁辨經云出入廢則神機化滅升降息則氣立孤危又云一息不運則機緘窮一毫不續則穹壤判此言人生之氣出入升降貴乎往來不窮乃成生生之妙用若外為六淫所傷內為七情所結則喘哮短氣少氣氣逆息賁之證種種作矣然何以辨之喘者促促氣急喝喝痰聲張口抬肩搖身擷肚由於肺氣感邪肺葉張舉或虛而挾寒或實而挾熱或水氣上乘虛火上炎或氣鬱所感脾胃不足皆有此候風寒必有冷痰如冰之證實熱必有壅盛燥渴之證水氣必脅下脹滿有聲四肢浮腫虛火必得食即減食已即發乍進乍退氣鬱必鼻息引張煩悶胸滿胃虛必氣道奔急喘甚不休治者隨證而施使浮游之火下降清肅之令下行自不復有火矣哮者與喘相類但不似喘開口出氣之多聖濟總録名為呷嗽是也以胸中多痰結於喉間與氣相系隨其呼吸有呀呷之聲得之鹹酸太過積熱膠痰痰去則聲少息倘不節口而胸中未盡之痰得新味相結哮又作矣治之以吐痰為生若遇冷而發者因中外皆寒宜溫其肺金若寒包其熱者宜清肺藥中兼加發散則自然愈也短氣者呼吸雖急而不接續似喘無痰聲亦不搖肩呻吟而無痛禁雖若氣上衝實非氣上衝也凡氣食阻者宜瀉之元氣虛者宜補之少氣者氣少不足以言即經所謂言而微終日復言為奪氣之候皆因中氣不足所致故短氣猶有屬實少氣惟有補虛而已逆氣者但氣上奔急肺壅而不下若有不能呼吸之狀實於哮喘短氣不同息賁者五積中之肺積也喘息奔急亦名息積右脅下必有積塊以別之人之五臟皆有上氣而肺為之總司其體清虛有升有降即出入皆利其用健運少氣少血即升降無資故喘哮諸證皆在肺金分野治之亦宜在肺然屬實者毋庸更論屬虛者又應變通如土虛而不能生金者則治在脾而中樞能運或腎虛而不能納氣者治在腎而北門有鎖皆以氣味厚藥實其中下二焦之間不得泥夫壅逆之候而束手逡巡也噦逆咳逆乾嘔嘔吐五證辨噦逆者噦而氣逆也俗所謂發厄吃逆吃忒總當名噦是也咳逆者咳而氣逆也咳嗽之咳也乾嘔者空嘔也聲出而物不出也嘔者聲物兼出也吐者物出而聲不出也此數者方書每混論無別何以辨之靈樞曰胃有故寒氣與新穀氣俱還入胃新故相亂真邪相攻氣並相逆復出於胃故為噦素問曰病深者其聲噦傷寒論有食谷者噦有飲水火劫失下妄下諸逆治至病深者噦蓋指俗論發厄而吃吃然有聲者為噦也千金方謂咳逆為噦逆之名非矣素問云歲金太過有病咳逆少陽司天初之氣二之氣俱有病咳逆又金鬱之發民病咳逆蓋皆論肺金及火為病分明指咳嗽之咳因氣逆者而名為咳耳烏得與噦逆紊乎仲景傷寒論咳逆者僅見於辨脈平脈二篇至金匱要略稱咳逆者疊出可略舉而證也曰病咳逆脈之何以知為肺癰寸口脈微而數微則多風數則為熱且云風傷皮毛合於肺則咳又曰咳逆上氣時時吐濁但坐不得眠皂莢丸主之又肺癰胸滿一身微腫咳逆上氣喘鳴迫塞瀉肺湯主之又曰咳逆倚息不得臥小青龍湯主之此皆咳而氣逆為病也須知論咳而或曰咳或曰咳逆同一咳證而已兼以逆字言者不過因咳而氣上逆耳是即喘吐噦嘔有曰喘逆吐逆噦逆嘔逆類耳明理論以辨脈篇咳逆脈散者入於咳冷之條而與噦目為一類謂噦則吃吃然有聲者斯皆合仲景之旨矣奈何論聲則是論名則非故又曰噦者咳逆是也附和千金之說強合二證為一名矣由是後世以吃逆忒逆為咳逆者紛紛王安道既知咳嗽為咳逆又認有吃忒之咳逆故亦蹈俗呼之弊良由昧於噦耳謂乾嘔乃噦之微噦乃乾嘔之甚乾嘔者其聲輕小而短噦者其聲重大而長夫二者雖有微甚之分蓋一證也安道此說強分一證為二名矣乾嘔雖甚可變為噦哉若視乾嘔為病輕斷為病重遂斷聲有輕重大小長短以乾嘔甚為噦因引素問病深者其聲噦之句以證噦病重於乾嘔不思人病重時每有作噦忒聲者非病深而噦者乎反以乾嘔之甚者名噦未免以吃芯之當名噦者為咳逆矣欲辨昔人之非得毋轉相紊亂乎或曰子以安道為非然要略有云乾嘔噦若手足厥者橘皮湯主之豈非乾嘔噦乃同類之一證故合言之耶余曰此正乾嘔且噦二證互見故並言之也然則所謂乾嘔吐逆吐涎沫用半夏乾薑散者亦乾嘔與吐逆並言也亦可視為同類之一證哉安道之論噦與咳逆余雖未能從若夫乾嘔與吐之辨則信乎千古定論也其曰嘔兼聲物故無物而聲空鳴者謂之干干猶空也至於吐則必有物矣其可謂之干仲景於嘔字加一干字所以別夫嘔為聲物俱去也又仲景嘗言欲嘔矣未嘗言欲乾嘔欲噦也夫欲之為義將出未出而預覺之者惟有形之物則然無形之聲則不然也嘔與吐主物言故可謂之欲乾嘔與噦主聲故不可謂之欲發明聲物兼出為嘔物之獨出為吐聲之獨出為乾嘔聲獨出而吃忒作聲為噦逆咳嗽上逆為咳逆孰能易其言哉噎膈反胃本於陰枯陽結論噎膈反胃多因於內傷憂鬱失志及恣意酒食縱情勞役以致陽氣內結陰血內枯而成也經云三陽結謂之膈三陽手太陽小腸手陽明大腸足太陽膀胱也蓋小腸熱結則小水短少而火氣不泄大腸熱結則大解不利而鬱熱難除膀胱熱結則津液不充而道路蹇澀三陽並結則前後之氣不行下既不行則火邪上逆氣火上逆則痰涎愈生痰涎生則往來之氣愈阻而嘔逆噎膈之證起矣且也重傷之以七情更感之以六氣或不戒炙爆肥膩之物或妄投辛香燥熱之劑遂使火邪愈熾津液枯痰涎愈結病情愈深豈易療哉須分上中下三焦以治之夫咽嗌梗塞氣不順行水飲可行食物難入其槁在吸門名之曰膈其或食下則胃脘作痛煩悶不安須臾吐出食出而安其槁在賁門名之曰噎噎者屬上焦其或食雖可下良久復出槁在幽門名曰反胃亦曰胃反此屬中焦其或朝食暮吐暮食朝吐所出完谷小便赤大便難或如羊矢其槁在闌門亦名反胃上屬下焦然壯者猶或可治當用透膈疏氣化痰清火健胃和脾之劑經又曰噎膈多生於血乾反胃亦生於脾弱東垣曰脾陰也血亦陰也陰主靜內外兩靜則臟腑之火何由而生金水二臟有養陰血自生腸胃津液傳化合宜噎膈反胃之有哉三消證治論夫三消者即內經之所云消疸消中也多飲而渴不止為上消如氣厥論云肺消膈消奇病論云消渴是也消穀善飢為中消如脈要精微論云疸成為消中師傳篇云胃中熱則消穀是也溲便頻膏濁不禁為下消如病形篇云肝腎脈微小為消疸肝腎在下是也何柏齊齊曰造化之機水火而已宜平不宜偏宜交不宜分水為寒濕火為燥熱火性炎上水性潤下憔火在下水在上方為既濟而坎離相交若水偏盛不交則為腫脹火偏盛不交則為消渴惟制其偏而使之交斯為善治者矣袖珍云人生之有腎猶水之有根故腎臟受病必先形容憔悴雖加滋養不能光澤凡患此證皆腎經為病由壯盛之時不能保攝恣情快欲或飲酒無度或嗜炙爆過多或久服丹石之藥遂致腎水枯竭心火燔灼三焦猛烈五臟煎熬而消渴生焉治當補腎水瀉心火除腸胃燥熱之盛濟身中津液之衰使道路散而不結津液生而不枯血氣和平其病自已此治消渴者但察其虛實清火壯水或滋瀉隨所宜而用之法也然內經陰陽別論曰二陽之病發心脾其傳為風消此陽明為十二經之海土衰而木氣乘之故為肌肉消也氣厥論曰心移寒於肺為肺消飲一溲二死不治此言元陽之衰而金寒水冷則為肺腎之消也病形篇曰五臟之脈微小者皆為肺疸此言寸口之脈弱見於外以氣血之衰而消於內也又氣交變大論曰歲水太過上臨太陽民病渴而妄冒五常政大論曰太陽司天寒淫所勝民病嗌乾渴而欲飲是皆以陰抑陽以水制火必以溫劑散去寒邪其病自愈也由是觀之又烏得概作熱治哉余嘗治一縉紳年逾四旬因案牘積勞致神困食減時多恐懼上焦無渴不嗜湯水或少飲則沃而不行每至夜必去溺三十餘合半皆津液最後延余診視因相告曰自病以來通宵不寐者已半載余間或朦朧睡去必夢見亡人凶喪等事又與鬼魅相親余謂之曰此思慮積勞損傷心腎元氣既虧則陰邪勝之故多陰夢陽衰則氣虛陽不帥陰則水不化氣故飲雖少而陰濁多也此正素問飲一溲二之疾幸脈猶帶緩肉尚未脫胃氣尚行可以無慮必俟陽氣漸回則陰邪自漸退矣乃用歸脾去木香八味去丹澤一以養陽一以養陰至三百餘劑人參二十餘斤而後愈此正肺消於上精消於下之證可見消亦有陰陽醫斷不可執滯而不通也知我罪我其鑑豫言三消從火斷論八卦之中離為烜物五行之中火能焚物六氣之中火能消物故火之為用燔木則消而為炭焚土則消而為磚鍊金則消而為汗煨石則消而為灰煮水則消而為湯煎海則消而為鹽鍊汞則消而為粉熬錫則消而為丹故澤中之潦涸於炎暉鼎中之水涸於壯火蓋五臟心為君火正化腎為君火對化三焦為相火正化膽為相火對化得其平則烹煉飲食糟粕去焉不得其平則燔灼臟腑而津液竭焉故入水之物無物不長入火之物無物不消無一身之心火甚於上為膈膜之消甚於中為腸胃之消甚於下為膏液之消甚於外為肌肉之消上甚不已則消及於肺中甚不已則消及於脾下甚不已則消及於肝腎外甚不已則消及於筋骨四臟皆消盡則心始自焚而死矣故素問有消疸消中消渴風消膈消肺消之說消之證不同歸之於火則一也故消疸者衆消之總名消中者善飢之通稱消渴者善飲之通謂惟風消膈消肺消三說不可不分風消者二陽之疾多風邪所鼓格拒賁門消鑠腸胃水不能咽口乾善渴經曰二陽結為之消善食而瘦者名曰食㑊是也膈消者金受火邪善飲數溲變為水腫經曰心移熱於肺為膈消是也肺消者肺外為寒邪所搏陽氣不施內為火所燥元極水復故皮膚索澤而㑊著溲溺積濕而頻下上飲半升下行十合經曰心移寒於肺為肺消飲一溲二死不治是也膈消不為寒所薄陽氣得以散於外為可治肺消為寒所薄陽氣自潰於中為不可治夫消者必渴渴亦有別膏粱之人多肥甘之渴與藥石之渴藜藿之人則惟燥熱之渴而已故火在上者善渴火在中者善飢火在下者善渴多飲而數溲火在中下者不渴而溲白液火遍上中下者飲多而數溲此其判也後人斷消為腎虛水不勝火之故其用藥則又非是何也以八味丸治消水不能生而火反助也惟河間制言立法甚得內經之旨而世俗不知故消渴一證調之而不下則水潤少濡不能殺炎上之勢下之而不調亦旋飲旋消不能沃膈膜之干下之調之而不戒嗜欲不節喜怒不減滋味則病已而復作能知此者消渴不足憂也消渴亦有屬寒辨按消渴之證雖由火熱然亦有屬虛寒者如內經所云心移寒於肺為肺消飲一溲二死不治之證是也蓋飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺其肺所受之津液俱賴心火以熏蒸之故能上及耳設心火既衰則上下不交陰陽失偶津液何由熏蒸上達哉故肺燥則求救於水究無火以熏蒸則愈飲愈渴上飲半升下行十合譬之釜底有火則釜中水沸自然暖氣升騰其蓋有汗若火滅水寒則氣不上行釜蓋自無以潤此理之必然也今之醫者不達其故謂內為熱所傷外為寒所膈其亦不思之甚矣其心火者君火也雖不可以妄動而亦不可消滅今內經言移寒於肺明是火衰之候與下文心移熱於肺為膈消火甚鑠金之病二證迥然各別何得一概作熱治之乎若果然則能消水矣何反飲一溲二乎昔人以八味治渴正為此證倘不明陰陽虛實概用寒涼之劑未免增其病耳故辨及之首疢論方書多分頭痛頭風為二門然一病也但有新久去留之分耳淺而近者名頭痛卒然而至易於解散深而遠者名頭風作止不常愈後仍發皆當驗邪所從來乃世俗不作風醫即從寒治安知內經有不一之邪乎如雲風從外入振寒汗出頭痛新沐中風則為首風大寒內至骨髓髓以腦為主腦逆故頭痛傷寒一日巨陽受之頭項痛少陽司天初之氣候乃大溫病氣發於上頭痛二之氣熱鬱於上頭痛又火淫所勝民病頭痛濕淫所勝頭痛時眩凡此皆六淫相侵與清陽真氣上薄而痛者也有云頭痛甚則腦盡痛手足寒至節死頭痛巔疾下虛上實心熱甚頭痛面赤肺熱病頭痛汗出腎熱病頭痛貞貞淡淡然厥頭痛面若腫起而煩心益悲泣貞貞頭痛頭半寒痛膀胱足太陽所主頭囟頂腦戶中痛膽足少陽所主凡此皆臟腑經脈之氣逆亂於清道壅遏經隧而痛也蓋頭象天天府清陽之氣皆會於此五臟清華之血亦注於此於是天氣所發六淫之邪人氣所變五賊之逆皆能相害或蔽覆其清明或瘀塞其經絡因邪氣相薄鬱而成熱脈滿則痛若邪氣稽留脈滿而氣血亂則痛甚是實痛也若寒濕所侵真氣虛弱雖不相薄成熱然邪客於脈外則血泣脈寒寒則縮卷筋急外引小絡而痛得溫則止是虛痛也因風痛者抽掣惡風或無汗因熱痛者煩心惡熱或有汗因濕痛者頭痛而遇天陰更甚因痰痛者頭昏而憒憒欲痛因寒痛者結急而惡寒戰栗氣虛而痛遇勞則甚其脈大血虛而痛善生驚惕其脈芤傷食頭痛痞塞咽酸而惡食傷酒頭痛噁心眩暈而吐酒更有偏頭風者在左屬風與血虛在右屬痰與氣熱雷頭風者或因風邪所客起塊起核或因痰火上逆如蟬如雷真頭痛者上引泥丸死於旦夕大頭痛者腫大如斗疫氣時行眉稜骨痛者風寒痰熱皆得干之頭風白屑者木旺凌脾金來報復頭癢者濕也痰也二者皆能郁頭搖者風也火也二者皆能動用是分別施治無不得矣心胸胃脘脅腹諸痛辨內經之論心痛未有不兼五臟為痛者獨詳於心而略於胸腹舉一以例其餘也心為君主義不受邪受邪則本經自病名真心痛必死不治然經有云邪在心則病心痛喜悲眩僕此言包絡受邪在腑不在臟也又云手少陰之脈動則病嗌乾心痛渴而欲飲此言別絡受邪在絡不在經也其絡與府以邪皆因怵惕思慮傷神涸血是以受如持虛而分論九種曰飲曰食曰熱曰冷曰氣曰血曰悸曰蟲曰疰苟不能遍識病形將何以為治耶胃屬剛土列處中焦為水穀之海五臟六腑十二經脈皆受氣於此壯者邪不能幹怯者著而為病偏熱偏寒水停食積皆與真氣相薄而痛肝木相乘為賊邪腎寒厥逆為微邪挾他藏而見證當與心痛相同但或瀉或脹或嘔吐或不能食或吞酸或大便難或瀉利面浮而黃本病與客邪必參雜而見也胸痛即膈痛其與心痛別者心痛在歧骨陷處胸痛則橫滿胸間也其與胃脘痛別者胃脘在心之下胸痛在心之上經曰南風生於夏病在心腧在胸脅此以脅屬心也肝虛則胸痛引背脅肝實則胸痛不能轉側此又以胸屬肝也夫胸中實肺家之分野其言心者以心之脈從心系卻上肺也其言肝者以肝之脈貫膈上注於肺也脅痛舊從肝治不知肝固內舍膺脅何以異於心肺內舍膺脅哉若謂肝經所過而痛何以異於足少陽心主所過而痛哉若謂經脈挾邪而痛何以異於經脈所過而痛哉故非察色按脈細審各經氣變卒不能萬舉萬當也且左右肝肫氣血陰陽亦有不可盡拘而臨證者可無詳察耶腹痛分為三部臍以上痛者為太陰脾當臍而痛者為少陰腎少腹痛者為厥陰肝及大小腸衝任四經每部各有五賊之變七情之發六氣之苦五運之邪至紛至博苟能辨氣血虛實內傷外感而為之調劑未有不中痛情者矣心痛解夫心者君主之官一身之所聽命焉故五臟失治皆為心痛之病經中刺治分經理甚明悉若是金針用藥尤宜詳察腎心痛者多由陰邪上衝故善瘈如從後觸其心胃心痛者多由停滯故胸腹脹滿脾心痛者多當寒逆中焦故其病甚肝心痛者多由木火之郁病在血分故色蒼蒼如死狀肺心痛者多由上焦不清病在氣分故動作則痛益甚若知在氣則順之在血則行之鬱則開之滯則通之火多實則清之散之寒多虛則溫之補之必隨手取效也凡諸經心痛心與背相引心痛徹背背痛徹心宜急溫其經諸府心痛難以俯仰小腹上衝卒不知人嘔吐泄瀉其勢甚鋭急宜溫其腑至臟邪乘心名真心痛手足青至節不可救藥者多宜急溫其心包並注邪別脈然心痛甚者脈必伏以心主脈不勝其痛其脈自伏也切不可因其脈伏神亂駭為心虛而用地黃白朮補之蓋邪得溫藥則散得寒膩藥則不散不可不慎之也溫散之後方可陰陽平補之痛無補法辨後世治痛之地有曰痛無補法者有曰通則不痛痛則不通者有曰痛隨利減者人皆傳誦以此為不易之法凡是痛證無不執而用之不知痛而閉者固可通之如經云熱結小腸閉而不通之類是也痛而泄者不可通也如經云寒客小腸後泄腹痛之類是也觀王荊公解痛利二字最妙曰治實法云諸痛為寒痛隨利減後世以利為下也假令痛在表者實也痛在裡者實也痛在血與氣者亦實也故在表者汗之即愈在裡者下之即愈或在氣血者散之行之即愈豈可以利為下乎宜作通字訓則可此說甚善得治實之法矣然痛證亦有虛實治法亦有補瀉其辨之之法不可不詳凡痛而脹閉者多實不脹不閉者多虛痛而拒按者為實可按者為虛喜寒者多實愛熱者多虛飽而甚者多實飢而甚者多虛脈實氣粗者多實脈虛氣少者多虛新病壯年者多實愈攻愈劇者多虛痛在經者脈多弦大痛在臟者脈多沉微必普脈證而察之則虛實自有明辨實者可利虛者亦可利乎不當利而利之為害不淺凡治表虛而痛者陽不足也非溫經不可裡虛而痛者陰不足也非養營不可上虛而痛者心脾實傷也非補中不可下虛而痛者脫泄亡陽也非速救脾腎溫補命門不可夫以溫補而治痛者非不多也奈何醫者專執痛不可補氣之說豈良法哉痃癖等七種釋名論或悶痞與痃癖積聚癥瘕病雖相似而名各不同請逐一條陳其說以曉後學可乎曰痞者否也如天地不交之否內柔外剛萬物不通之義也物不可以終否故痞久則成脹滿而莫能療焉痃癖者懸絶隱僻又元妙莫測之名也積者跡也挾痰血以成其跡亦郁久積至之謂耳聚者緒也依元氣以為端緒亦聚散不常之意耳症者徵也以其有所徵驗及久而成積聚也瘕者假也又遐也以其假借氣血成形及歷年遐遠之謂也大抵痞與痃癖乃胸膈之候積與聚乃肚腹間之病因屬上中二焦之病故多見於男子其癥與瘕獨見於臍下是為下焦之病故常見於婦人大抵腹中有塊不問積聚癥瘕俱為惡候切不可視為尋常而不求醫早治若待脹滿已成胸脅膨擊雖倉扁復生亦莫能救遘此疾者可不慎乎治積按初中末法論積之成也正氣不足而後邪氣踞之如小人在朝由君子衰也正氣與邪氣勢不兩立若低昂然一勝則一負邪氣日甚正氣日消不攻去之喪亡無及矣然攻之太急正氣轉傷初中末之三法不可不講也初者病邪初起正氣尚強邪氣尚淺則任受攻中者受病漸久邪氣較深正氣較弱任受且攻且補末者病魔經久邪氣侵凌正氣消殘則任受補蓋積之為義日積月纍匪伊朝夕所以去之者亦當有漸太急則傷正氣正氣傷則不能運化而邪反固矣余嘗制陰陽二積之劑藥品稍峻用之有度補中數日然後攻伐不問其積之多少又與補中待其神旺則復攻之屢攻屢補以平為期此余獨得之訣百發百中者也經曰大積大聚其可犯也衰其大半而止故去積及半純與甘溫調養會脾土健運則破殘之餘積不攻而自走必欲攻之無餘不遺其人之不夭殃者亦鮮矣經曰壯者氣行即愈怯者著而為病潔古云壯盛人無積虛人則有之故當養正則邪自除譬如滿座皆君子一二小人自無容身之地雖然此謂輕淺者言爾若大積大聚不搜而逐之日進補湯無益也審知何經受病何物成積見之既確髮直入之兵以討之何患其不愈兵法之善攻者敵不知其所守是亦醫中之良將也夫蟲積論蟲由濕熱鬱蒸而生觀之日中有雨則禾節生蟲其理明矣古分九蟲三尸等論余謂自積成蟲難以定名若盜食人之氣血得其清者謂之靈蟲久能移害於人即勞蟲傳尸尸疰之類是也若採人之飲食得其濁者謂之物蟲久而能變異即寸白蛔蟲魚鱉癥瘕之類是也故物蟲者多因自積而成乃有形可驗之物治宜以有形相制相畏之藥如雷丸蕪荑使君川椒黃連苦楝之屬靈蟲者多因自虛而致乃變化莫測之物治宜以氣類相感之藥如桃仁川椒天靈蓋蘇合香麝香硃砂之屬外有鬼氣中惡亦靈蟲之類也因飲食蟲蛭及果中毒蟲亦物蟲之類也治宜格其物理考其所畏以制之又有久患勞瘵氣亢血熱之人勿用辛烈等藥大抵人面萎黃四肢無力飲食不為肌膚乃血氣虛損起伏作痛聚散不定皆有蟲害宜急攻之若待成靈傷殘臟腑不可救矣服蟲藥宜前半月上半日蟲頭向上時忌妄言預泄蓋蟲既有靈能拒避湯藥故也黃疸證毋拘五證宜別三焦論丹溪云疸證不必分五同是濕熱如𠆢覀皿醬相似斯言已得大義然考之內經有上中下之分有曰目黃曰黃疸者有曰黃疸暴病久逆之所生也少陰厥陰司天四之氣溽暑皆發黃疸者悉是上焦濕熱病也有云食已如肌曰胃疸者與脾風發疸腹中熱出黃者又脾脈搏堅而長其色黃者靈樞所謂脾所生病黃疸皆中焦濕熱病也有謂溺黃赤安臥者黃疸及腎脈搏堅而長其色黃靈樞所謂腎所生病黃疸皆下焦濕熱病也獨仲景妙得其義詳於傷寒證中有曰邪熱入里與脾經相交則發黃或內熱已甚覆被火熱兩陽相灼亦發黃或陽明熱甚無汗小便不利濕熱不泄亦發黃或發汗已身面目俱黃者為寒濕在裡不解故發黃是知非特濕熱發黃而寒濕亦發黃也但寒濕之黃黑暗不明熱甚之黃明如橘色大抵黃家屬太陰太陰者脾也為濕熱所蒸則土之本色外現或脈沉小腹硬小便自利其人如狂者又為血在下而發黃也治疸須分新久新疸濕熱少張即當消導滲利如茵陳五苓散茯苓滲濕湯之類無不效者久病脾胃受傷血氣必弱宜用補劑如參朮健脾湯當歸秦艽之類使正氣盛則邪氣自退庶可收功若口淡怔忡耳鳴腳軟或微寒熱小便赤白濁又當作虛治宜養榮湯或八味丸四君子皆可用不可過用涼劑強通小便恐腎水枯竭久而面黑黃色不可治矣陰黃說先哲云水火即人身熟腐水穀之氣得其平謂之水火失其宜謂之濕熱濕熱相搏氣不得達而生黃是固然矣然王海藏云傷寒病遇太陽太陰司天若下之太過往往變成陰黃一則寒水太過水來犯土一則土氣不及水來侵之用茵陳湯次第加薑附茱萸治之夫傷寒熱病而有陰黃則雜病黃疸亦有陰黃矣故身冷畏寒陰黃也濕勝脾虛陰黃也二便清利陰黃也脈沉而微陰黃也凡遇此等非溫補不愈設以黃色為土邪有餘而過行朱伐飲食必減胃氣必虧由脾傳腎變為黑疸而不可治良可悲矣七疝解疝隱疾也古稱七疝寒水筋血氣狐㿗也寒疝者腰痛牽引睪丸屈而不伸其脈沉遲得此之由必是寒客下體如坐於卑濕涉於寒水之所起也寒氣自外入內束其少火郁其肝氣故令腰痛痛而牽引睪丸者肝之經絡環陰器故也寒主收引故令屈而不伸尺內主腰脈沉遲皆陰象也宜吳茱萸加附子湯主之水疝者腎囊腫大陰汗不絶得之飲水醉後勞於使內蓋飲水醉酒則濕氣勝勞於使內則腎氣虛腎虛則濕勝而流攻者勢也故令陰囊腫大如水晶陰汗不絶如罅漏也經云下者舉之又云風能勝濕宜升陽除濕湯主之筋疝者莖筋掣痛挺脹不堪此得之房勞邪術所使春方多熱毒之劑故令脹滿不堪宜甘草梢黑豆湯主之血疝者外腎因撲損而傷睪丸偏大有時疼痛者中有瘀血名曰血疝宜於夜分之時自以一手托其下一手按其上由輕至重揉摩百遍彌月之間瘀血盡散陳氣皆行誠妙法也氣疝者遇有拂鬱則睪丸腫大遇有悲哀則不藥而消蓋邪之所湊常垂其虛拂鬱而睪丸腫大者肝氣垂腎之也悲哀則不藥而消者氣有所泄也先哲云肝腎之病同一法治宜虎潛丸主之或曰何以不用橘核川楝枳實青皮之類余曰皆破氣之藥昔人多用之然治標云爾況蹈重虛之戒乎氣實用之可也狐疝者晝則氣出而腎囊腫大令人不堪夜則氣入而腫脹皆消如無其疾狐之為物晝則出穴而溺夜則入穴而不溺以斯證肖之故名狐疝晝陽也夜陰也晝病而夜否氣病而血不病也宜補中益氣湯升舉下陷之陽加黃柏知母以益夫不足之坎或曰何不用子和辛香流氣之品余曰此氣虛所致若更流藏非惟無益而又害之也㿗疝者頽大也睪丸雖大而無疾此係父子相傳得於有生之初非有生以後外因所致之疾也故不必主治或先有㿗疝後來疼痛疾苦者必兼前六證之法治之淋閉證治論小便不通之謂閉滴瀝作痛之謂淋二者因心腎不交蘊積熱毒或酒後房勞或飲食燥熱七情鬱結所致皆一類也自嚴氏有五淋之分氣淋者小腹滿悶便澀常有餘瀝砂淋者莖中痛尿難卒出膏淋者尿如脂膏勞淋者勞倦即發痛引氣衝血淋者遇熱即發甚則溺血候其鼻色黃者小便難也至東垣論肺為生水之上源腎為主液之元氣若淋而口渴身熱脈數者為肺受肝邪熱失其降水之令為氣分證宜以輕清淡滲藥瀉熱若無身熱口渴為血分之候宜以滋陰厚味藥助腎愚按嚴氏之意乃以腎與膀胱本病論之東垣之辨是兼他證而言也何也以其論中肺受熱邪之證及肺患喘嗽與夫脾病脹滿淋閉水泄小便澀少皆他病致淋不因腎與膀胱也是知淋閉之證主乎心腎而實關乎脾肺矣丹溪則又謂膀胱之府有上口而無下口得引升騰之氣乃施滲泄之令氣化則能出苟氣血偏濁或正虛下陷遂郁成淋譬之滴水之器上竅不通則下竅不出宜加柴胡升麻等藥提之若中氣弱不能運化清濁而淋者宜加補氣之藥若因血虛而氣不能升提者蓋氣為血配血虛則氣亦虛而湧泄之令不行宜補血加升提若酒食過度濕痰積於胸膈脈見弦滑證見痞悶者宜二陳湯加香附木香探吐次加山梔木通調之此亦一法也愚按造化之理陽無陰不化陰無陽不行非升不能降非降不能升故吐者升之法也滲利者降之法也利濕清熱等劑者陽分氣藥也瀉火滋陰等劑者陰分血藥也或升降同用或氣血兼加但血分之病不用偏施滲泄恐反耗其精液以致虛而愈燥惟少用肺引通子母相生之情氣分之病不可純用沉寒恐更泥滯其化生以致郁愈而淋惟少用辛潤行氣令氣化則滲泄而出今人見用溫藥遂疑淋有冷證不知此氣鬱從治之法耳外有挾寒淋瀝先寒戰而後溲便因寒氣與正氣爭邪氣盛則寒戰成淋正氣盛則寒戰解而便利有汗過多小便當赤澀如淋因五內枯燥慎勿用利小便之劑亦有小便艱難莖中不痛而癢者乃積所致非淋也又有跌僕損傷及服溫藥燥澀太過致血汙留並婦人經水不通血積成瘕並能作淋閉則必小腹滿痛或手不可近宜用紅花桃仁等破血更有難産為收生者損胞致小便淋瀝不斷其證必無痛澀但滴而不自覺或覺而不痛別當大補氣血若大小便皆閉上為嘔吐者世稱關格最難調治經云不得盡期而死也精濁論溺與精所出之道不同淋病在溺道故綱目列之肝膽部濁病在精道故綱目列之腎膀胱部今患濁者雖便時莖中如刀割火灼而濁自清惟竅端時有穢物如瘡之有膿目之有眵淋瀝不斷初與便溺不相混濫如河中之清也至易辨之每見時醫以淋法治之五苓八正雜投不已因而增劇者不可勝數余每正之其餘當難以臆說也蓋由敗精腐者什九由濕熱流注而虛者什一或曰昔人以赤濁為心虛有熱由思慮而得之白濁為腎虛有寒由嗜欲而得之何原病式以二濁俱屬於熱丹溪亦云濕熱有痰子能與我折乎曰辨古今之得失必以內經正之自巢氏病源論言白濁由勞傷腎虛冷歷代宗其說有異詞不惟白濁之理未明即治濁之法亦誤不思內經本無白濁之名惟言思想無窮入房太甚發為白淫與脾移熱與腎出白少陰在泉溲白此白濁之源也原病式因內經諸病水液混濁皆屬於熱言天氣熱則水渾濁寒則清潔又言水體清火體濁正如清水為湯自然白濁也可謂發聖人之旨正千秋之誤而不讀其書者猶未盡知也丹溪則以濕熱痰虛並言然虛寒者不可謂盡無但熱多寒少耳故靈樞有中氣不足便溲為變之語是當先補中氣以升舉之而後分其氣血施治設腎虛甚或火邪亢極者不宜峻用苦寒必反佐治之更在權衡輕重而已精滑便濁分別辨精滑與便濁不同便濁是便溺渾濁即五淋之膏淋也乃是胃中濕熱滲入膀胱與腎經絶無干涉精滑則牽引黏膩雖不便溺亦時有之此是腎水不足淫火易動精離其位故令漸積而出耳治之者宜滋腎清心健脾固脫蓋精濁雖腎之液而所以精濁者心為之主也夫君火一動真精自失能止其心乃我身之大丹也又考千金方治精遺便濁凡九方而用韭子者居其半夫韭子辛熱何思邈取之深也蓋用以治便濁者取其辛熱之氣能燔土濕使蒸熱上行而不下乃釜底加薪之法益火之源以消陰翳也用以治遺精者取其辛熱之氣以壯真陽使之涵蓄陰精而不漏乃益土防水之法衛外而為固也凡此不傳之祕可與知者道耳遺精白濁皆由心腎兩虛辨遺精者不交而自泄也夢遺者夢交而泄也二者皆從精道而出夫精雖藏於腎而實主於心雖有邪術所使夢與人交及娩人鬼胎夜感之甚未必不由心腎兩虛邪乘虛入者何也蓋心之所藏者神腎之所藏者精心腎者精神之根蒂也凡男子思慮過度則水火不交快情恣欲則元精失守所以心動者神馳神馳者精散因晝之所思故夜有所夢今人多用龍骨牡蠣等澀精之劑隨止隨發惟知固腎不知治心殊不知神不歸舍則無精無主安能自守哉濁者從小便竅中而出如油如膏或有五色光彩或赤或白或澄根渾濁或如精狀名曰白淫雖與遺精所出各異所感則一亦心血虧少相火內熾中焦濕熱淫氣不清譬如井中取水至清烹之為白湯澄之則有腳豈非濕熱渾濁者乎醫者但當分其虛實輕重濕熱多少而治如有虛損諸證者則從虛治因於心者養心以收神因於腎者因腎以澀精正虛者主濕勝宜溫補心腎之劑偏虛者主熱勝宜清補心腎之劑濕熱從丹溪治法若患久者宜升舉之藥其外更有思欲不遂而精泄有氣盛久無色欲精漏遺泄者非病也老年人耳聾與少年人異治法論人身有九竅陽七竅眼耳口鼻是也陰二竅前後便溺所出是也清陽走上竅而下入於陰位則有溺溲腹鳴之候濁陰走下竅而上入於陽位則有窒塞耳鳴之候故人年五十以外腎氣漸衰於下每每從陽上逆而耳之竅職失聰耳之聰司於腎腎主閉藏不欲外泄因肝木為子疏泄母氣而散於外是以謀慮鬱怒之火一動陰氣從之上逆耳竅窒塞不清故能近聽不礙而聽遠不無少礙高年之體大率類然較之聾病一天一淵聾病者其竅中另有一膜庶蔽外氣不得內入故以開竅為主而方所用石菖蒲麝香等藥及外填內攻等法者皆為此而設至於高年不自收攝陰氣致越出上竅之理從無一人言及反以治少壯耳聾藥及發表散氣藥兼帶陰虛不治是以百無一效不知陰氣至於上竅亦隔一膜不能超出竅外止於竅中汨汨有聲如蛙鼓蚊雷鼓吹不已以故外入之聲為其內聲所混聽之不清若氣少不逆上則聽少清氣全不逆上則聽全清矣故凡治高年逆上之氣大法宜以磁石為主取其重能達下性主下吸又能制肝木之上吸故也次用地黃龜膠群陰之藥以補之更用五味山萸之酸以收之令陰氣自至於本宮不上觸於陽竅由是空曠無塞耳之於聲似谷之受響萬籟之音尚可細聆豈更與人聲相混艱於遠聽耶此實至理所在但醫術淺薄之輩不能知之試觀人之收視而視益明反聽而聽愈聰者亦可恍然悟矣自汗盜汗論經云陽之汗以天地之雨名之此言陰陽和而雨澤降非病也惟無因而汗斯為病矣或謂汗出於心或出於脾或謂心脾二臟為汗之總司實不知五臟皆能令人汗出也夫在內為血在外為汗而心實主血此汗之主於心西南坤土在人為脾人之汗猶土氣濕熱蒸為雨露此汗之出於脾金臟主氣又主皮毛氣虛則腠理不固而津液泄此汗之出於肺木臟主風又主疏泄故傷風必自汗此汗之出於肝腎主五液又主閉臟陰虛則陽垂之故虛勞多盜汗此汗之出於腎又如經云驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝動搖勞苦汗出於脾飲食飽甚汗出於胃由是觀之不惟五臟有汗而六腑亦有汗矣然約言之自汗盜汗無不由於心腎兩虛而得之者蓋津與汗同類隨其陽氣所在之處而生亦隨其火擾之處而泄為汗自汗者不因發散不因勞動不分寤寐溱溱然自然汗出由陰蒸於陽分也玉屏風散主之盜汗者眠熟則出醒則倏然而收即內經之寢汗陽蒸於陰分也當歸六黃湯主之蓋腎虛即陰虛陰虛陽必湊不能內營而退臟則盜汗而發熱多屬內傷也心虛即陽虛陽虛陰必垂不能衛外而為固則自汗而發熱多屬外傷又汗孔謂之鬼門盜汗甚則令人喪魄陰陽之道陽密乃固自汗甚則令人妄陽二汗之義大概如斯然傷寒邪在半表半裡似盜汗者則非陰虛之比又為小柴胡湯之證矣火氣上蒸胃濕而自汗則非陽虛之比又為涼膈散之證矣學者詳之癲癇狂辨癲癇狂三證不同而方書或言癲癇或言風癇或言風癲或言風狂每致混淆無別蓋癇歸於五臟於心故立言之家癲狂可以合論者以癲為陰而狂為陽則對待立名互相闡發也癇證則自有陰陽之分迥與二證不同所宜特立一門也姑撮其要言之癲者或悲或笑或歌或泣如醉如癡言語不分次序處境不分穢淨積年愈難此志願不遂者多有之狂者猖狂剛暴妄見妄言罵詈不避親疏抵觸不畏水火甚則棄衣而走登高而歌逾牆上層非力所能如有邪附此傷寒陽明內實才多有之蓋心熱甚則多喜而為癲笑語失序癲倒錯亂之謂也肝熱甚則多怒而為狂躁擾奔越狂妄不禁之謂也二者俱屬痰熱內實之證信乎河間之卓識然以難經重陰重陽之說為非理又不然矣如內經云暴怒傷肝以肝氣逆而血亂也暴喜傷陽以心氣緩而神逸也又云多陽者多喜多陰者多怒是以難經亦以喜怒分陰陽而未嘗以寒熱分陰陽也癲狂之證皆名失心心主不明則十二官危故視聽言動皆失其職初病者宜瀉其實久病者宜安其神此治法之大概也癇者皆以風熱痰而得之在表而淺名陽癇故言易治在裡而深名陰癇故云難治此又以表裡淺深名陰陽亦非以寒熱分陰陽也其證發即仆地悶亂無知嚼舌吐沫背反張目上視手足搐搦或作六畜聲一月數發者易治經年一發者難治吳山甫云風陽氣也內經云陽之氣以天地之疾風名之故其發也暴然所以令人仆地者厥氣並於上上實下虛清濁倒置令人悶亂無知者濁邪干乎天君而神明壅窒也舌者心之苗而脾之經絡連於舌本陽明之經絡入上下齒縫中故風邪入於心脾則舌自挺風邪入於陽明則口自噤一挺一噤故令人齧舌吐沫風熱入於內也此風來潮湧之象背反張目上視者風在太陽經也足太陽經起於睛明挾脊而下風邪干之則實而徑急故目上視而背反張手足搐搦者風屬肝木肝木主筋風熱甚於肝則一身之筋牽搐故令手足搐搦也搐者四肢屈曲之名搦者十指開握之義或作六畜聲者風痰鼓其氣竅而聲自變也譬之弄笛焉六孔閉塞不同而宮商別異是也治法宜疏風豁痰清熱安魂實者即攻虛者先補其純因情志者從內經五志相勝法解之驚悸恐辨或問驚悸怔忡恐怖之別曰悸即怔忡也怔忡者本無驚恐動而不寧驚者因外有所觸而卒動子和云驚為不自知恐為自知是也蓋驚者聞響即驚恐者自知如人將捕之狀與夫不能獨處必須伴侶方不恐懼或夜無燈燭亦生恐懼之類怖與恐於義相同內經無有稱驚怖者始於金匱要略有云驚怖由是而見為驚恐即驚怖也大凡連稱其名以為提綱者多是一陰一陽對待而言如喜怒並稱者喜出於心心居於陽怒出於肝肝居於陰志意並稱者志是靜而不移意是動而不定靜則陰也動則陽也驚恐並稱者驚因觸於外事內動其心心動則神搖恐因感於外事內歉其志志歉則神卻是故內經謂驚則心無所依神無所歸慮無所定故氣亂矣恐則神卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣又謂嘗貴後賤嘗富後貧恐憂內結至於脫營失精病深無氣則灑然而驚此類皆是病從外致而動內之心神者也若夫在身之陰陽盛衰而致驚恐者驚是火熱鑠動其心心動則神亂神動無力故驚之變態亦不一狀隨其所之與五神相應而動肝藏魂魂不安則為驚駭為驚妄肺藏魄魄不安則驚躁脾藏意意不專則驚惑腎藏志志歉而驚恐心惕惕然胃雖無神然為五臟之海諸熱歸之則發驚狂若聞木音亦惕然心欲動也恐者則是熱傷其腎腎傷則精虛精虛則志不足志本一定而不移故恐亦無他狀內經於驚之病邪者有火熱熱淫司天在泉勝復之氣有各經熱病所致有三陽積並有氣並於陽皆為驚疾故病機統而言曰諸病驚駭皆屬於火也於恐之病邪者有精並於腎則恐有血不足則恐有陰少陽入陰陽相搏則恐有胃氣熱腎氣微弱則恐有腎是動病氣不足則恐然於肝之驚恐互相作者以其臟屬陽居陰納血藏魂魂不安則神動神動則驚血不足則志歉志歉則恐皆因人之陰陽所動而內生者也為治之法驚則安其神恐則定其志神屬陽陽則氣也火也志屬陰陰則精也水也水火既濟全在陰精上奉以安其神陽氣下藏以定其志神安則散亂之氣可斂氣斂氣斂則陽道行矣志定然後走失之精可固精固則陰氣用矣若為外事驚者子和謂驚者平之平常也使病者時時聞之習熟而不驚固是良法余謂不若使其平心易氣以先之而後安其神定其志為得也驚風論驚風一證從來謬認蓋小兒初生以及童幼肌肉筋骨臟腑血脈俱未充長陽則有餘陰則不足不比七尺之軀陰陽交盛也惟陰不足陽有餘故身內易至於生熱熱甚則生痰生風生驚亦所恆有設當日直以四字立名曰熱痰風驚則後人不炫因四字不便立名乃節去二字以驚字領頭風字煞尾使後人不能解遂以為奇特之病且謂此病有八候以其頭搖手痙也而立抽掣之名以其卒口噤腳攣急也而立目斜心亂搐搦之名以其脊強背反也而立角弓反張之名相傳既久不知其妄造遇見此等證出無不以為奇特不知小兒之腠理未密易於感冒風寒風寒中人必先入太陽經太陽之脈起於目內眥上額交巔入絡腦還出別下項夾脊抵腰中是以病則經脈強因經脈牽強則生抽掣搐搦角弓反張種種名目而用金石藥鎮墜外邪深入臟腑千中千死萬中萬死間有體堅證輕得愈者又詫為再造奇功遂至各守專門雖日殺數兒不知其罪如方書有云小兒八歲以前無傷寒此等糊語竟出自高明偏足為驚風之說樹幟曾不思小兒肌肉柔脆不耐風寒初傳入太陽一經早已身強多汗筋脈牽動人事昏沉勢已極於本經湯藥亂投死亡踵接何由見其傳經耶此所以誤言小兒無傷寒也不知小兒易於外感易於發熱傷寒為獨多世稱為驚風者即是也小兒傷寒要在三日內即愈為貴若待經盡方解必不能耐矣又剛痙無汗柔痙有汗小兒剛痙少柔痙多世醫見其汗出不止神昏不醒往往以慢驚風證為名而用參附耆術等藥閉其腠理熱邪不得外越亦為大害所以凡治小兒之熱但當徹其出表不肯引其入里也仲景原有桂枝若舍而不用從事東垣內傷為治毫釐千里最宜詳慎又新産婦人去血過多陰虛陽盛其感冒發熱原與小兒無別醫者相傳稱為産後驚風尤堪笑破口吻然小兒亦非無驚風病也一二歲時氣怯神弱凡遇異形異聲驟然跌僕皆生驚畏其候面青糞青多煩多哭略有所觸則灑灑然時恐懼不寧不比熱邪塞竅神識昏迷對面撞鐘放銃全然不聞者斟酌細勘自識從來混治之誤矣七情考世之所謂七情者即內經之五志也五志之外尚餘者二總之曰喜怒憂思悲恐驚然情有七無非出於五臟如陰陽應象論曰心在志為喜肝在志為怒脾在志為思肺在志為憂腎在志為恐此五臟五志之分屬也至若五志有互通之病者如喜本屬心而有曰肺喜樂無極則傷魄蓋心肺皆主喜也夫喜傷於陽而心肺皆為陽臟故喜出於心而移於肺所謂多陽者多喜又若怒本屬肝而有曰膽為怒者以肝膽為表裡肝氣雖強盛而取決於膽也有曰血並於上氣並於下心煩惋善怒者以陽為陰勝故病及於心也有曰腎盛怒不止則傷志有邪客於足少陰之絡令人無故喜怒者以怒發於陽而侵乎腎也是以肝膽心腎四臟皆能病怒所謂多陰則怒亦曰陰出之陽則怒又若思本屬脾而有曰思則心有所存神有所歸正氣留而不行故氣結矣蓋心為脾之母母氣不行則病及其子所謂心脾皆病于思也又若憂本屬肺而有曰心之變動為憂者有曰心小則易以傷憂者蓋憂則傷神故傷心也有曰精氣並於肝則憂者肝勝侮脾也有曰憂愁而不解則傷意者脾主中氣中氣受抑則生意不申故鬱而為憂是心肺肝脾四臟皆能病於憂也又若恐本屬腎而有曰恐懼則傷心者神傷則恐也有曰血不足則恐有曰肝虛則恐者以肝為將軍之官肝氣不足則怯而恐也有曰恐則脾氣乘矣有曰精並於脾則畏畏即是恐以腎虛而脾勝之也有曰胃為氣逆為噦為恐者以陽明土勝亦傷腎也是心肝脾肺腎五臟皆主於恐而恐則氣下也五志五病之辨既詳如上其外尚有悲病者有曰肝悲哀動中則傷魂是悲傷於肝也有曰精氣並於肺則悲有曰悲則肺氣乘矣亦金氣傷肝也有曰心虛則悲有曰神不足則悲有曰悲哀太甚則胞絡絶胞絡絶則陽氣內動發心下崩致溲血者皆悲傷於心矣此肝肺心三臟皆病於悲而氣為之消也有病為驚者曰東方青色入通於肝其病發驚駭以肝應風木風主震動而連乎膽之有曰陽明所謂甚則驚厥聞木音則惕然而驚者肝邪乘胃也有曰驚則心無所倚神無所歸者心神散失也此肝膽胃心四臟皆病於驚而氣為之亂也由此言之是情志之傷雖五臟各有所屬然求其所由則無不從心所發故本神篇曰憂愁恐懼傷心病形篇曰怵惕思慮則傷神神傷則恐懼自失口問篇曰悲哀憂愁則心動心動則五臟六腑皆搖可見心為五臟六腑之大主而總統魂魄兼該志意故憂動於心則肺虛思動於心則脾虛怒動於心則肝虛恐動於心則腎虛所謂五志惟心所使設能善養此心而居處安靜無為懼懼無為欣欣婉然從物而不爭與時變化而無我則志意和精神定悔怒不起魂魄不散五臟俱安邪亦安從奈我哉寢食說經云調寢食在醫藥之先即聖人治未病之說夫色聲既受非安穀不能生精與氣非安枕不能養血與神是以百病阽危必首論云漿粥能進否驗其胃氣之敗與不敗寤寐如常否察其神思之寧與不寧不食少臥病也多食嗜臥亦病也衛生卻病者能不諦當於寢食間哉不能食之證有傷寒而痞滿嘔惡嘔食者有氣滯而痛楚妨食者有痰聚而不能容食者有能食而食入反出者有憂恐太過鬱結而不思食者有孕婦胎成而惡阻者有脾胃熱而胃脘寒雖飢不嗜食者有脾胃自虛而不能健運者有火不生土無由熟腐者有大病後中氣虛惡聞食氣者有胃脘乾槁而勺粒不入者大抵因多食而頓不能食者為實從少食而漸不能食者為虛多食之證有火伏陰分胃熱善消穀或大腸移熱於胃胃移熱於膽善食而瘦謂之食㑊亦名息中者有傷寒入臟厥冷下利當不食而反能食名曰除中者有中風風木自盛克脾脾土受克求助而多食者有一臟之虛必偏嗜一味如懷孕之肝虛嗜酸者有蟲積為患好食茶葉生米泥炭草紙之類者有病後胃虛之極而飽食易飢者大抵多食易化責在陽明之火火食難化責在太陰之虛不得臥之證若勞神憂慮耗其陰血惺惺不寐病在心也若神氣衰微疑神疑鬼怔忡悸怯獨處無睡病在肝膽也若水氣上逆喘嗽有音不能仰臥病在肺也若因有驚恐神出舍空痰乘虛入則譫妄不寐病在心胞絡也若氣血不足病後虛煩則略睡而醒病在脾也若傷寒陽明府病內有燥屎則熱甚而臥不安病在胃也若年高之人氣虛血減肌肉漸澀晝不精而夜不瞑病在營衛也故心脾肝膽營衛之不臥多屬不足肺胃胞絡之不臥多屬有餘也嗜臥之證若肝氣受熱或濁火亂其神明多睡少醒由於熱也若脈緩怠惰四肢不收體重泄瀉而嗜臥由於濕也若頭重身熱而昏憒不醒屬於風也若勞役之餘及脫血下痢之後精神未復而酣然沉困屬虛也若其人天稟有餘腸胃大而皮膚澀大者衛氣留於陰分者久澀者衛氣行於陽分者遲既久且遲衛氣不達而多眠臥屬於陽不勝陰也若飲食才入輒生困倦精神昏冒呵缺欲睡者由於脾倦或兼濕熱也然傷寒邪入少陰則脈微細但欲寐也故神間而甘寢者人之常神憊而嗜臥者人之病以上諸條寢食不調之候可謂略具別證既明則治法可從而推廣然此皆為已病而設也若未病豫調之說在養生家說述甚夥吾有取於侗初張氏之言曰凡飲食之節減滿受虛故當飢而食節其滿未飽先止留其虛睡臥之法先睡心後睡眼睡心是止法睡眼是觀法能斯二者始可與言養生然世復有寢食無節之流顧不食而縱酒不寐而漁色是又疾不幹人人來求疾是以莊生云人之可畏者在衽席飲食之際信矣
