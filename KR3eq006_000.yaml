front:
  text: 曹序嬴秦燔書古籍灰燼惟醫書及周易得免斯厄良以醫之精理參天地通陰陽實與易相表裡而非區區方技家所能該也又非末學淺夫所得管窺而莛撞也軒岐以來代有傳書汗牛充棟非精識之士不能讀也即讀矣而旁騖歧出未得宗旨狃古方以診百病之變遷猶患其顧此失彼適燕趙而不改南轅也然則醫之難如是讀醫書之難如是苟得一窮究醫理卓然成家搜羅群籍提要鉤元豈非快事耶吾吳葉香岩先生嘗裒集古今醫書削繁就簡折衷一是為醫衡若干卷雖篇頁無多而去取有法圭臬不遠實淮南枕中鴻寶也顧其書不少概見庚申之變板毀於兵識者病焉恆家自高曾以來潛心醫理不乏藏書俱付劫火恆幼承先大父命考求醫學勿敢有間二十年來徵集舊帙百不獲一猶復臨診鮮暇偶一治書輒感慨系之常熟繆丈少初久宦中州循聲卓著今以假歸嘗出是編示恆曰君世習醫將謀重鋟以資利濟君不可以無言竊惟是書簡而有法純而不駁擴充之可得醫學源流即墨守是編已足為南針之指夫醫道不明久矣淺陋者逐利而不足言博雅之士膠柱鼓瑟狃於一偏病淺而求諸深病易而求諸難班志所謂原人血脈經絡骨髓陰陽表裡以起百病之本死生之分而調百藥齊和之所宜者戛戛難之今繆丈重鋟是編津梁後學洵仁人之用心哉吾知是編之出有目共賞不脛而走無待贅言異日更著活人之書作萬家生佛召父杜母流聲馥蘭恆且仰睇之而未有艾也爰不揣固陋而志其緣起云光緒十六年歲在上章攝提格壯月吳縣曹元恆敘柳序醫學肇於靈素猶儒家之有六經乃衆理之總彙證治之極則所謂不廢江河萬古流也長沙張仲景出實有以紹軒岐之傳廣湯液之用於醫門推為至聖洵不誣已魏晉以降醫術流為方技士大夫恥習其業墜緒茫茫不絶者如縷宋和政間開和劑惠民等局以療民病令太醫院試其通於靈素之理者授之以官始令為醫於是醫學稍稍振興劉李朱張各家崛起金元間而或論溫熱或主脾胃或專滋陰或任攻伐家各為說人持一是正如漢儒說經各承家法靡所折衷明代王損庵等諸賢輩出拾遣補闕闡發經旨斯道昌明於斯為盛其中矯然特出獨立門戶者則如張鳳逵之論暑吳又可之論疫喻西昌之補秋燥張介賓之辨陽虛皆能於此道中開徑自行不為舊說所蒙然或嫌其略或失之粗或辨焉而過於刻深或論焉而涉於膚淺亦猶宋儒鑽研性理疏說經義非不各有心得可以扶翼聖道而各得一偏要未能悉歸至當則甚矣斯理之精深而不可無以衡之以衷於一是也我朝醫學昌明名流迭出吾吳葉天士先生以穎敏之才探靈蘭之奧一時活人之名震乎宇內惜乎求治者多其生平精力殫於治病未遑有所著述世傳醫案數種亦非其所手定其中真贋相參瑜瑕不掩讀者病焉外如景嶽發揮一書雖有闡發而言多憤激似非著作體裁又有本草經注本事方釋義兩種類以五行五臟配合敷衍絶少精意似亦非先生手筆或者先生名重當時門弟子竊其緒論著為成書遂托其名於先生歟惟溫熱論一卷雖篇帙無多而其中發明證治補前賢之遺闕示後學以指歸言皆精要語不遊移洵可法可傳之作而溫邪犯肺逆傳心包一語猶為後人指摘則信乎著述之難而醫理之不可不衡以一是也審矣甲午長夏晤繆君少初於石梅精舍縱談醫理繆君不以詒為固陋出先生所著醫衡一書見示而索序焉詒受而讀之其書雖採自前人而綱羅宏富抉擇精嚴其不愜於理者又經改定間附論說以裨闕漏所謂衡之以理而衷於一是者此書其庶幾乎繆君以賢宰官乞退闢精廬於湖山佳處怡情松菊寄傲煙霞蓋有古人之高致者而惓惓於是書刊以行世蓋以極斯人之疾苦而登之仁壽其猶是賢宰官愛人無已之心也夫繆君深於斯理而不屑以醫名爰書此以質之或者其有以教我乎即幸甚光緒二十年甲午中秋前二日江陰後學柳寶詒書於琴川舟次繆序餘本不知醫少年奔走四方見夫率爾操觚草菅人命者指不勝屈心竊憫之由是稍稍涉獵方書又苦諸家持論不同或拘泥古法或固執偏見或狃於門戶習氣各承師說聚訟紛紜淺識者寡陋孤聞易為掏惑博覽者依違兩可靡所適從是醫書愈多醫學愈雜誠不如不服藥之為中醫也嘗欲訪求專門名家足以抗衡前人者相與考核群編鑑空衡平權衡至當俾業醫者折衷一是奉為定衡庶不至倒行逆施旁騖歧出為醫書之枕中祕即為醫學之指南針豈非杏林橘井之集大成者耶惜乎有其志而無其人也嗣遊京師獲交會稽呂梅卿先生見其衡診立方舉重若輕適如分量不偏不倚直可合劉李朱張為一家向之所謂抗衡前人者先生其庶幾乎心折既深時從請益臨別乞授片言先生曰籲古今醫書汗牛充棟烏能以管窺蠡測謂遽可融會而貫通耶雖然有執簡御繁之一法有由博返約之一法子吳人也亦知吳中有葉先生乎曾見其醫衡一書乎誠得是書翻覆玩索即不啻三折肱矣余恍記曾經寓目歸而搜諸敝簏原書具在狂喜不禁然不知吳中先未刊行竟為絶無僅有之本陽湖管君敬伯長洲彭君簫九皆奄貫百家尤精軒岐學僉稱見所未見囑即補刊以廣其傳攜歸里門適楊濱石太常養疴家居假觀逾月凡字句訛闕處逐一添注塗改悉臻完善請制辨言則以醫非夙習辭維時以醫道著名繼葉先生而代興者吳門則曹君智涵澄江則柳君谷孫均已樂為之序備述此書功效余但記校刊緣起並諸君之相與有成云光緒二十年甲午季秋虞山繆萼聊識於伊園金序醫道至微蓋難言喻矣天有六淫之感人有七情之擾人在氣交之中好惡動於內利欲奪於外曷能免是則百病從此出矣病之由輕而致愈由重而致殆其生死之權醫操之也得醫而良則病可免得醫而庸則夭枉不可勝數矣然而為醫者莫不喜良而惡庸脫庸者亦必自詡為良此人之情也無如明理者少而悖理者多一為資質所限一為師心自用遂致流於庸者一途而不自知也苟欲明理非博考方書研究病情不可然自軒岐而下方書汗牛棄棟高明者好為穿鑿或失之泛固陋者苟守繩墨即失之隘誠欲一編簡明詳盡理暢辭達者而不可得學者病之我朝葉天士先生以天縱之才秉穎敏之質又復潛心好學孳孳不倦想因診事忙碌未遑有所著述然此醫衡一書乃生生裒集先賢精論名言其中論脈論症論治靡不詳且備焉吾知是編一出學者庶得有所遵循而無多歧之感矣願君渭川才廣學博藏書數百種暇輒手握一卷以自遣其於五運六氣之不齊南北方土之異宜人身經絡之支別營衛運行之離合以及臟腑脈理病情變化莫不窮源竟委洞燭機宜以余之愚猶復虛衷辱問雖土壤細流無裨大益然其胸懷過人處有非平常所可幾及者今以重刊醫衡以便同志探討索序於余余即以平日所言者銓次之用敢質諸先生先生其有以教我乎宣統二年十一月下浣元和繹聲金文鍾識於海上寄廬顧序余自束髮受書以來即喜岐黃家言暇輒涉獵之雖稍稍有所進益然無師承終以未得門徑為憾及冠從家叔兆麟專習醫理自黃帝內經神農本草而下熟讀者數十種披覽者百餘卷潛心十餘年頗得此中奧妙以應病者之求十愈七八顧未能萬全也心竊愧之旋逢同志創立醫學研究所復蒙上海道憲頒給鈐記以鄭重衛生研究醫學為宗旨然上古醫學莫要於針灸至今幾湮沒不聞良可惜也乃在所內復設針灸傳習所聘請教員以教諸生余均與其事二年畢業後始覺斯道大明蓋針灸與湯藥法雖不同而理實一貫誠以治病之要首先辨證辨證不明針藥奚從考古方書汗牛充棟聚訟盈庭各鳴一得或以陽氣為重或以陰血為主或講脾胃或論溫熱淺學讀之而搖惑高明觀之而用歧因思葉天士先生有醫衡一書皆搜羅先賢精傑之作或抽揚脈理或闡發病機其論旁通曲達義明辭顯可為醫家模範奈世少傳本坊刻多謬余乃將藏本細加校正誤者改之缺者補之付之石印以便同學由此書先行研究然後博覽群籍即不為異說所惑始可升仲景之堂而入軒岐之室豈僅抗衡前人而衷於一是者乎然則是編也不惟為湯藥之津梁抑且為針灸之指南焉耳宣統二年葭月孟河顧夢熊渭川撰於上海醫學研究總所自序近世醫理不明醫學荒雜治病不辨三因虛實一概籠統用藥以致虛虛實實殺人如麻曷勝悼嘆良由不肯留心前人論病論脈論治諸說遂至越規矩棄繩墨師心自用若欲脫去陳方舊論而獨闢新奇殊不知仲景而下如河間丹溪東垣潔古海藏諸賢衡證衡脈用藥立方絲絲入扣不偏不倚如物之有衡焉法有定衡不及於衡者擴而充之太過於衡者約而斂之庶可以起沉疴而不誤人命余早歲業醫深陋俗習渴欲抗衡前人以為近日醫流砥柱匯採前人論病論脈論治精確不磨之說以成上下卷標其目為醫衡垂作模楷則三因辨虛實分自無籠統用藥之弊不特後學可為衡鑑即余之惟日孳孳長恐誤人者亦未嘗敢越比衡中也竊願持衡不失得進而抗衡前人斯幸矣古吳葉桂天士書
