body:
  text: 卷上養身論猗歟哉歷代醫書之盛凡三百七十九家五百九十六部一萬三千一百餘卷反復詳明其要主於卻病而已然內經有一言而可盡廢諸書則不治已病治未病是也此説一出而後多以修養為言不知夫修養與保養原自有異修養則雜於方外元遠而非恆言恆道保養則於日用飲食而為可法可經如運氣之法運任督者久則生癰運脾土者久則腹脹運丹田者久則尿血運頂門者久則腦泄其餘丹砂烹煉之説遺禍纍纍然則修養之與保養不大相徑庭哉請述保養之法上古天真論曰飲食有節起居有常不妄作勞精神內守病安從來故形與神居而盡終天年度百歲乃去此保養之正宗也蓋有節有常則氣血從軌而無事於搬運之煩精神內守則身心寧定而無事於制伏之強形與神居而神不離形形不離神而無損天年之慮保養既若是之易且顯何今之夭者多而壽者少歟蓋香醪美酒陳於前雖病所忌也而弗顧情況意興動於中雖病所禁也而難遏貪名競利之心急雖勞傷過度而不覺何況心神百結斫耗多端劉孔昭曰萬人操弧而向一鵠鵠能無中乎萬物炫耀以惑一生生能無傷乎即有少知收斂精神安居靜養者又不知百年機括希求不死雖終日閉目只是一團私意靜亦動也若識透百年定分而事事循理不貪不躁不妄可以卻未病而盡天年矣蓋主乎私則生死念重而昏昧錯妄愈求靜而不靜主乎理則人欲消亡而心清神悅不求靜而自靜此吾所以但言保養而不言修養也然則保養之法不亦盡廢諸書乎避風寒以保其皮膚六腑則麻黃桂枝溫中四逆之劑不必服矣節勞逸以保其筋骨五臟則補中益氣劫勞健步之劑不必服矣戒色欲以養精正思慮以養神則滋陰降火養營凝神等湯又何用哉薄滋味以養血寡言語以養氣則四物四君十全三和等湯又何用哉要之血由氣生氣由神全神乎心乎養心莫善於寡欲吾聞是語未見其人不得已而仍從一萬三千一百餘卷中更覓一治已病之法也運氣説運氣之説有太過不及而勝復由以生正太過者其氣勝勝而復製則傷害甚矣不及者其氣衰衰而復克則敗亂極矣此勝復循環之道出乎天地之自然而亦不得不然也故在天有五星勝氣之應在地有萬物盛衰之應在人則有臟腑疾病之應如木強勝土則歲星明而鎮星暗土母受侮子必復之故金行伐木以救困土則太白增光歲星反晦也凡氣之現於上者則災應乎下宿屬受傷逆犯尤甚正運互為勝復其氣皆然至其為病如木勝肝強必傷脾土肝勝不已燥必復之而肝亦病矣燥勝不已火必復之而肺亦病矣此五臟互為盛衰其氣亦皆然也夫天運之有太過不及者即如人身之有虛實也惟其有虛而復強者勝之有勝而復承者復之無衰則無勝矣無勝則無復矣其氣和平焉得有病恃強肆暴元氣先盡焉得毋虛故曰有勝則復無勝則否勝微則復微勝甚則復甚可見勝復之微甚由變化之盛衰本無其常也六元正紀論所載天時地化人事等議至詳至備蓋以明其理之常者如此也即如周易之六十四卦三百八十四爻乃闡明易道之微妙教人因易以求理因象以致變故孔子曰書不盡言言不盡意此其大義正與本經相同夫天道元微本不易測及其至也雖聖人亦有不知焉故凡讀易者當知易道有此變不當曰變止於此也讀運氣書者當知天道有是理不當曰理止於是也然變化雖難必而易盡其機也天道雖難測而運氣盡其妙矣自余有知以來常試以五大之義逐氣推測則彼此盈虛十應八九即有少不相符者正如井蛙之見而見有未至耳豈天道果不足憑耶今有昧者初不知常變之道盛衰之理孰者為方孰者為圓孰者為相勝反勝主容承製之位每執鑿經文以害經意徒欲以有限之年晨概無窮之天道隱微幽顯誠非易見管測求全陋亦甚矣此外復有不明氣化如馬宗素之流者假仲景之名而為傷寒鈐法用氣運之更遷擬主病之方治拘滯不通誠然謬矣然又有一等偏執己見不信運氣者每謂運氣之學何益於醫且云疾病相加豈可依運氣以施治乎非切要也余喻之曰若所云者是真運氣之不求而運氣可易言哉觀歲運之流行即安危之關係或疫氣遍行一方皆病風溫或清寒傷臟一時皆犯瀉痢以衆人而患同病謂非運氣之所使然歟奇經八脈大旨人之一身有經脈有絡脈直行曰經旁行曰絡幾經有十二手足三陰三陽是也絡有十五乃十二經各有一別絡而脾又有一大絡並任督二絡為十五絡也共二十七氣相隨上下如泉之流如日月之行不得休息故陰脈榮於五臟陽脈榮於六腑陰陽相貫如環無端菲知其紀終而復始其流溢之氣入於奇經轉相灌溉內運臟腑外濡腠理奇經凡八脈不拘制於十二經無表裡配合故謂之奇蓋奇經猶夫湖澤正經之脈隆盛則溢於奇經秦越人比之天雨下降溝渠溢滿滂沛傍行流於湖澤此發靈素之祕也八脈散在群書略而不悉豫雖不敏謂陳大旨八脈者陰維也陽維也陰蹺也陽蹺也沖也任也督也帶也陽維起於諸陽之會由外踝而上行於衛分陰維起於諸陰之交由內踝而上行於營分所以為一身之綱維也陽蹺起於跟中循外踝而上行身之左右陰蹺起於跟中循內踝而上行身之左右所以使機關之蹺捷也督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海帶脈則橫圍於腰狀如束帶所以總約諸脈者也是故陽維主一身之表陰維主一身之裡以乾坤言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也督脈主身後之陽任脈主身前之陰以南北言也帶脈橫束諸脈以六合言也八脈之中惟任督二脈為人身之子午為升降之道交媾之鄉如鹿運尾閭能通督脈足於精龜納鼻息能通任脈足於氣是以二物得壽此奇經八脈之大旨至於經穴病狀具見瀕湖脈考中六脈綱領靈樞以緩急大小滑澀六脈而定病變可謂總諸脈之綱領素問則曰大小滑澀浮沉難經曰浮沉長短滑澀而仲景則曰弦緊浮沉滑澀此六者名為殘賊能為諸脈作病滑伯仁曰大抵綱領之要不出浮沉遲數滑澀六脈所謂不出者以其足統夫表裡陰陽虛實冷熱風寒濕燥臟腑血氣之病也浮為陽為表證為風為虛沉為陰為里證為濕為實遲為在臟為寒為冷數為在腑為燥為熱滑為血有餘澀為氣獨滯也此諸説者詞雖少異意實相通若以豫見言之總不出乎表裡虛實寒熱六者而已如浮為在表則散大而芤可類也沉為在裡則細小而伏可類也數為熱則洪滑疾促之屬可類也遲為寒則澀結代緩之屬可類也虛為不足則短弱濡微之屬可類也實為有餘則弦緊動革之屬可類也然即此六者之中又復有大相懸絶之要則又不可不知夫浮為在表而凡陰虛者脈必浮而無力是浮不可概言表矣可升散乎沉為在裡而凡邪初感之甚陰寒束於皮膚陽氣不能外達則脈必先現沉緊是沉不可概言里矣可內攻乎諸數為熱而凡陰虛之候陰陽俱虛氣血散亂者脈必急數愈數者愈虛愈虛者愈數是數不可概言熱矣可寒涼乎微細類虛而痛極閉塞者則多伏匿是伏不可概言虛矣可驟補乎弦數類實而真陰大虧者必關格倍常是弦不可概言實矣可消伐乎夫如是是即於綱領之中而復有大綱領者存焉設不以四證相參而孟浪任意未有不覆人於反掌間者此脈道所以難言而毫釐不可不辨也血營氣衛論氣取諸陽血取諸陰人生之初具此陰陽則亦具此氣血氣血者其人生之根本乎血何以為營營行脈中滋榮之義也氣何以為衛衛行脈外護衛之義也然則營與衛豈獨無所自來哉曰人受谷於胃胃為水穀之海灌溉經絡長養百骸五臟六腑皆取其氣故清者為營濁者為衛營衛之氣周流不息一日一夜脈行五十度平旦以復會於氣口所謂陰陽相貫如環無端則是二氣恆相隨而不相離也夫惟血營氣衛常相流通則人何病之有一有窒礙百病由此生矣故氣之作養發而為喜怒憂悲驚恐寒熱思勞聚而為積痞癥瘕痃癖上為頭旋中為五膈下為臍間動氣或喘促或咳噫聚則中滿逆則足寒凡此者皆氣使之然也血之為患其妄行則為吐衄其衰涸則為虛勞蓄之在上其人妄蓄之在下其人狂逢寒則筋不營而攣急挾熱則內瘀而發黃在小便則為淋痛在大便則為腸風在婦人月事進退漏下崩中病尤不一凡此者皆血使之然也夫血譬之水也氣譬之風也風行水上即氣血之義也蓋氣血之帥也氣行則血行氣止則血止氣溫則血活氣寒則血凝氣有一息之不運則血有一息之不行病出於血調其氣猶可以導之病原於氣區區調血何與焉人之一身調氣為主是亦先陽後陰之義也若夫血有敗瘀泥滯乎諸經則氣之道未免有所壅遏又當審所先而決去之經所謂先去其血而後調之又不可不通其變矣然則調氣之劑以之調血則兩得調血之劑以之調氣則乖張如香附木香之類治氣可也治血亦可也若以歸地輩論之則其性纏綿於胃氣有虧矣用藥者審之君臣佐使逆從反正説君為主臣為輔佐為助使為用制方之原也逆則攻從則順反則異正則宜治病之法也必熱必寒必散必收者君之主也不宜不明不授不行者臣之輔也能授能令能合能分佐之助也或劫或開或擊或散使之用也破寒必熱逐熱必寒去燥必濡除濕必滲者逆則攻也治驚則平治損須益治留須攻治堅須潰者從則順也熱病用寒藥而導寒攻熱者必熱如陽明病發熱大便硬者大承氣湯酒製大黃熱服之類是也寒病用熱藥而導熱去寒者必寒如少陰病下利服附子乾薑不止者白通加人尿豬膽之類是也塞病用通藥而導通除塞者必塞如胸滿煩驚小便不利者柴胡加龍骨牡蠣之類是也通病用塞藥而導塞止通者必通如太陽中風下利心下痞硬者十棗湯之類是也反則異也治遠以大治近以小治主以緩治客以急正則宜也至真大要論曰辛甘發散為陽酸苦湧泄為陰淡味滲泄為陽鹹味湧泄為陰六者或收或散或緩或急或燥或潤或軟或堅或以所利而行之調其氣使之平故味之薄者為陰中之陽味薄則通鹹苦鹽平是也氣之厚者為陽中之陽氣厚則發熱辛甘溫熱是也氣之薄者為陰中之陽氣薄則發泄辛甘淡平溫涼是也味之厚者為陰中之陰味厚則泄鹽寒酸苦是也易曰同聲相應同氣相求水流濕火就燥云從龍風從虎聖人作而萬物睹本乎天者親上本乎地者親下則各從其類也故治病制方者須本此説而推之吐汗下該盡治法論人身不過表裡氣血不過虛實良工先治其實後治其虛粗工或治虛或治實謬工則虛虛實實惟庸工但補其虛不敢治其實舉世不省悟此余所以著三法也夫病非人身素有之物或自外入或自內生皆邪氣也邪氣中人去之可也攬而留之可乎留之輕則久而自盡甚則久而不已更甚則暴死矣若不去邪先以補劑是盜未出門而先修室宇正氣未勝而邪氣已橫鶩矣惟脈脫下虛無邪無積之人始可議補耳他病惟先用三法攻去邪氣而元氣自復也素問一書言辛甘發散滲淡為陽酸苦湧泄為陰發散歸於汗湧歸於吐泄歸於下滲歸解表解表同於汗泄利便同於下殊不言補所謂補者辛補肝咸補心甘補腎酸補脾苦補肺更相君臣佐使皆以發腠理致津液通血氣而已非今人所謂用溫燥邪僻之補也蓋草木皆以治病病去則五穀果菜肉皆補也又當辨其所宜使無偏傾可也若以藥為補雖甘草人參亦有偏勝之患是故三法猶刑罰也粱肉猶德政也治亂用刑治治用德理也余用三法常兼衆法有按有蹺有揃有導有增減有續止醫者不得余法而反誣之哀哉如引痰漉涎取涕迫淚凡上行者皆吐法也熏蒸泄洗尉烙針制砭射導引按摩凡解表者皆汗法也催生下乳磨積逐水破經泄氣凡下行者皆下法也天之六氣風寒暑濕燥火發病多在於上地之六氣霧露雨雪水泥發病多在於下酸苦甘辛鹹淡發病多在於中發病者三出病亦三風寒之邪結搏於皮膚之間滯於經絡之內留而不去或發痛麻淋痹腫癢拘攣皆可汗而去之痰飲宿食在胸膈發為諸病皆可湧而去之寒熱痼冷火熱客下焦發為諸病皆可泄而出之吐中有散下中有補經言知其要者一言而終此之謂也補瀉當分緩急有無説經言邪氣盛則實精氣奪則虛二句為治病之大關其詞甚顯其義甚微敢為詳辨蓋實言邪氣實宜瀉也虛言正氣虛宜補也凡邪正相搏而為病則邪實正虛皆可言也故主瀉者則曰邪氣盛則實當瀉也主補者則曰精氣奪則虛當補也各執一詞毫無確據藉口文飾孰得言非是以至精之訓反釀莫大之害不知理之所在必有不可移易者奈醫者不能察耳余請析之為四孰緩孰急其有其無也無虛者急在邪氣去之不遠留則生變也多虛者急在正氣培之不早臨期無濟也微虛微實者亦治其實可一掃而除也甚虛甚實者所畏在虛但固守根本以先為己之不可勝則邪無不退矣二虛一實者兼其實開其一面也二實一虛者兼其虛防生不測也總之實而誤補固必增邪猶或可救虛而誤攻真氣忽去勢必難回此虛實之緩急不可不思也所謂有無者察邪氣之有無也凡風寒暑濕燥火皆能增邪邪之在表在裡在臟在腑必有所居求得其本而直取之此所謂有有則邪氣之實也若非六氣之邪而病出之陰則皆情欲以傷內勞倦以傷外似邪非邪似實非實此所謂無無則病在元氣也不明虛實有無之人必致以逆為從以標為本絶人長命可不慎哉推內經不宜主旺氣説經言治其旺氣者謂病有陰陽氣有盛衰旺則治之反甚如陽盛陰衰者陰虛火旺也治之者不知補陰以配陽而專用苦寒治火之旺豈知苦寒皆沉降沉降則亡陰陰愈亡則火愈盛故服寒反熱者陰虛不宜降也又如陽衰陰盛者氣弱生寒也治之者不知補陽以消陰則寒愈甚故服熱反寒者陽虛不宜耗也又如夏令本熱而伏陰在內故多中寒冬令本寒而伏陽在內故多內熱設不知此而必欲用寒於夏治火之旺用熱於冬治寒之旺則有中寒隔陽者服寒反熱中熱隔寒者服熱反寒矣是皆治旺之謂而病之所以反也陽有餘陰不足論夫陽常有餘陰常不足在天地則該萬物而言在人身則該一體而言非直指氣為陽而血為陰也經曰陽中有陰陰中有陽正所謂獨陽不生獨陰不長也姑以治法兼證論之曰氣虛者氣中之陰虛也治法以四君子湯補氣中之陰曰血虛者血中之陰虛也治法以四物湯補血中之陰曰陽虛者心經之元陽虛也病多惡寒責其無火治法以補氣藥中加桂甚則三建中湯正陽散之類曰陰虛者腎中之真陰虛也病多壯熱責其無水治法以補血藥中加知柏等藥或大補陰丸滋陰地黃丸之類夫真元極衰之候初不可服桂附等藥恐反助火而爍真陰元陽虛脫之軀亦不可投芎苓等辛散淡滲之劑恐反開腠理而泄其氣昧者謂氣虛即陽虛止宜用四君斷不可服芎苓之屬血虛即陰虛止宜用四物切不可用參耆之屬殊不知血脫補氣昔賢之治法也惟真陰虛極將為勞蒸咳嗽必用參耆恐肺熱傷肺不能抵當而反益其病可勿泥也病有真假辨經云病有逆從者以病有微甚病有微甚者以證有真假不知寒熱有真假真者正治知者無難假者反治乃為難耳如寒熱之真假者真寒則脈沉而細或弱而遲為厥逆為嘔吐為腹痛為飧泄下利為小便頻即發熱必欲得衣此浮熱在外沉寒在裡也真熱則脈數有力滑大而實為煩躁喘滿為聲音壯厲或大便祕結或小便赤澀或發熱掀衣或脹痛熱渴此皆真病真寒者宜溫其寒真熱者宜解其熱是當正治也至若假寒者火極似水陽證似陰也外雖寒而內則熱脈數而有力或沉而鼓擊或身惡衣或便熱祕結或煩渴引飲或腸垢臭穢此則惡寒非寒明是熱證所謂熱極反兼寒化亦曰陽盛格陰也假熱者水極似火陰證似陽也外雖熱而內則寒脈微而弱或數而虛或浮大無根或弦芤斷續身雖熾熱而神色自靜語雖譫妄而聲音則微或虛狂起倒而禁之則止或蚊迹假斑而涉紅細碎或喜冷水而所飲不多或舌面赤而衣被不徹或小水多利而大便不結此則惡熱非熱明是寒證所謂寒極又兼熱化亦曰陰盛格陽也此皆假病假寒者清其內熱內清則浮陰去舍矣假熱者溫其真陽中溫則虛火歸元矣是當從治者也又如虛熱實熱實則瀉之虛則補之此不易之法也然至虛有盛候則有假實矣大實有羸狀則有假虛矣總之虛者正氣虛也為色慘形瘦為神衰氣怯或自汗不收或二便不禁或夢遺精滑或嘔吐鬲塞或久病攻多或短氣似喘或勞傷過度或暴困失志雖外證似實而脈弱無神者皆虛證之當補也實者邪氣實也或外閉於經絡或內結於臟腑或氣壅而不行或血流而凝滯必脈病俱盛乃實證之當攻也然而虛實之間最多疑似有不可不辨其真者如經云邪氣盛則實精氣奪則虛此虛實之大法也設有人焉正已奪而邪方盛者將顧其正而補之乎抑先其邪而攻之乎見有不的則死生系之此其所以宜慎也夫正者本也邪者標也若正氣既虛則邪氣雖盛亦不可攻蓋恐邪未去而先脫呼吸變生則措手無及故治虛邪者先當顧正氣正氣存則不至於害且補中自有攻意未有正氣復而邪猶不退者此治虛之道也若正氣無損者邪氣雖微自不宜補蓋補之則正無與而邪反盛適足藉寇兵而齎盜糧故治實證者必直去其邪邪去則身安但法貴精專使致速效治實之道也要之能勝攻者便是實證不能勝攻者便是虛證惟是假虛之證不多見而假實之證最多也假寒之證不難治而假熱之證治多誤也世有不明真假本末而云知醫我敢輕許乎哉虛損宜分陰陽施治論夫病有虛實虛因正氣不足實因邪氣有餘凡外入之病多有餘如六氣所感飲食所傷之類內出之病多不足如七情傷氣勞欲傷精之類是也實者宜瀉經曰寒者熱之熱者寒之堅者削之客者除之結者散之留者攻之濕者行之強者瀉之之屬皆用瀉之法也虛者宜補經云散者收之燥者潤之急者緩之脆者堅之衰者補之勞者溫之損者益之驚者平之之屬皆用補之法也虛實之治大概如此但當今之人實者無幾虛者七八病實者其來速故其治易病虛者損傷有漸不易復元故其治難治實者但如為少壯新邪則可攻可拔猶足無慮治虛者但察其根本有虧有倏忽變幻可無慮乎故治實之法外有餘可散其表內有餘可攻其里氣有餘可攻其滯血有餘可逐其瘀方法星羅可無贅也惟虛損之治法有未盡不得不詳其要也夫人之虛損有先天不足有後天不足先天者由於稟受宜倍加謹慎急以後天之事補之庶可延年使覺之不早而漫不為意則未有不夭折者也後天者由於勞傷宜速加警省即以性情藥石調攝之使治之不早而遷延諱疾則未有不噬臍者也凡勞傷之辨勞者勞其神氣傷者傷其形體如喜怒思慮則傷心憂愁恐哀則傷肺是皆勞其神氣也飲食失度則傷脾起居不慎則傷肝色欲縱肆則傷腎是皆傷其形體也損其肺者傷其氣為皮焦而毛落損其心者傷其神為血脈少而不榮於臟腑此自上而傷也損其肝者傷其筋緩而不能收持損其腎者傷其精為骨髓消減痿弱不能起此自下而傷也損其脾者傷其倉稟之本為飲食不為肌膚此自中而傷也夫心肺傷而神色敗肝腎損而形體痿脾胃傷而飲食不化感此病者皆損之類也難經云損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此治損之法也然所損雖分五臟而五臟所藏無非精與氣耳夫精為陰人之水也氣為陽人之火也水火得其平則為精為氣失其和則為寒為熱此因偏損所以致有偏勝故水中不可無火無火則陰勝而寒病生火中不可無水無水則陽勝而熱病起但當詳辨陰陽則虛損之治無餘議矣如水虧者陰虛也則宜大補真陰不可再伐陽氣火虧者陽虛也只宜大補元陽不可再傷陰氣蓋陰既不足而復伐其陽陽亦亡矣陽既不足而復伐其陰陰亦損矣夫治虛治實本自不同實者陰陽固自有餘但去所餘而得其平虛者陰陽本有不足再去所有則二者俱敗其能生乎故治虛之要凡陰虛多熱者最忌辛燥恐助陽邪也尤忌苦寒恐伐生陽也惟喜純甘壯水之劑補陰以配陽則剛為柔克虛火自降而陽歸乎陰矣陽虛多寒者最嫌涼潤恐助陰邪也尤忌辛散恐傷陰氣也只宜甘溫益火之品補陽以消陰則柔得其主而沉寒自斂而陰從乎陽矣是以氣虛者宜補其上精虛者宜補其下陽虛者宜補而兼暖陰虛者宜補而兼清此固陰陽之治辨也其有氣因精而虛者自當補精以化氣精因氣而虛者自當補氣以生精又如陽失陰而離者非補陰何以收散亡之氣如陽失火而敗者非補火何以蘇隨散之陽此又陰陽相濟之妙用也故善補陽者必於陰中求陽則陽得陰助而生化無窮善補陰者必於陽中求陰則陰得陽而升泉源不渴故以精氣分陰陽則陰陽不可離以寒熱分陰陽則陰陽不可混此又陰陽邪正之離合也知陰陽邪正之治則陰陽和而生道得矣經曰不能治其虛何問其餘此之謂也因病似虛因虛致病論萬病不出乎虛實兩端萬方不越乎補瀉二法顧治實之法猶易知易行姑置弗論惟是治虛之法自古難之世運日衰元氣日薄虛病日衆方書日繁而治法日誤何歟良由誤於因病似虛因虛致病之分耳請得論之所謂因病似虛者其人本無他恙或感六淫之邪或傷飲食之積或為情志怫鬱或為氣血瘀留以致精神昏昧頭目昏花懶於言語倦於動作口中無味面目痿黃氣短脈沉厥冷泄瀉種種見證羸狀雖彰而鬱邪內固病者每多不謹於恆無不以虛自據而畏攻畏涼傍人但執外見之形無不指其虛而勸補醫者復多不明標本專聽陳言病源輒投補劑即有明者知其因病似虛而又首鼠兩端恐遭疑訕遷延時日坐失機宜邪得補而愈甚積得補而愈深怫鬱者解散靡從瘀留者滋蔓益甚又安知此病之所為非虛之所致也苟非先去其病安能即療其虛譬之城池失守而寇盜得以乘之乃不事驅攘惟汲汲於增墉置陴終當劫資燔舍斬關排䞵而後已亦何益於事哉故曰因病似虛者病為本而虛為標治本而標自己與其畏虛而釀成不可起之病孰若去病而猶冀有可補之虛也倘有以養正則邪自去君子進則小人退之説為喻是故大虛之中兼有實者論也若夫因病似虛之不可補又如一齊衆楚雖進君子之藥轉為小人進之用矣所謂因虛致病者其人先天之賦稟素弱後天之調養復乖或縱欲而傷精或心苦而神耗或處境有凍餒勞役或任情有驕姿宴安精傷者腎曠其作強之官神耗者心失其君主之用形寒飲冷傷肺飢飽勞役傷脾貧賤者多有之大怒逆氣傷肝醇醴厚味傷胃富貴者多有之內藏既傷外患易作以致陽虛惡寒陰虛惡熱上氣喘滿脅脹腹膨前後不通躁擾悶亂飲食不入脈大無根種種形證虛而類實雖肌肉未脫而神宰消亡即起居如常而患端萌伏然變證百出本乎一虛於此應補之際而病人旁人轉生疑慮或謂外邪未散或謂內積未除欲補陰畏寒涼之傷脾欲補陽畏燥熱之助火加之以無斷之醫遷就苟合幸試圖功殊不知此病之所為皆虛之所致也苟不專治其虛安能分治其實譬之旱潦相仍四民失業盜賊因而蜂起使非眚災施赦發粟賑貧而猶以徵朱為事恐朱之則不可勝朱盜賊未靖而元氣益受困矣故曰因虛致病者虛為本而病為標亦治本而標自己與其去病而虛不可保毋寧補虛而病可漸除倘醫者徒知應補而又不別夫營衛陰陽逆從反正陽虛而補陰則如水益深陰虛而補陽則如火益熱猶之因病似虛之法而治因虛致病之訛也辨此二者則虛證治之斯易又何有方書日衆治法日誤之慮哉中風五派異同論中風暴僕癱瘓等證古昔所論皆為外中風寒有餘之證而用大小續命八方等湯辛熱疏散之藥及劉河間出以為中風癱瘓者非肝之風實亦非外中之風邪良由將息失宜心火暴甚腎水虛衰不能制之則陰虛陽實熱氣怫鬱心神昏冒筋骨不用而卒倒無知亦由喜怒憂恐驚五志過極皆為熱甚俗云風者言末而忘其本也至東垣則又云中風非風乃本氣病也凡人年逾四旬氣衰之際或因憂喜忿怒傷其氣者多有此證壯歲之時無有也若肥盛者間有之亦是形盛氣衰所致然亦有賊風襲虛而中風者有三焉中府者病在表多著四肢故肢節廢中臟者病在裡多滯九竅故性命危中血脈者病在半表半裡故口眼喎斜丹溪則論之曰諸書則謂外中風邪惟劉河間作將息失宜水火不濟極是若真中風邪則東垣中腑中臟中經之説甚好然地有不同西北氣寒真為風所中者有之東南氣溫皆是濕生痰痰生熱熱生風耳有血虛有氣虛血虛者左手足不仁氣虛者右手足不仁此三子之論異於古説者也至王安道出推河間東垣非風之説丹溪濕痰之言遂以古論為真風三子論為類風愚竊有疑焉夫河間既曰中風非風又曰風者言末而忘其本也就風末言則有風存之意及用防風通聖藥品雖瀉火而實以治風東垣既曰中風何又辨有三中之異及致詳於治風之法丹溪既云濕生痰熱而何以又曰生風豫因知皆未嘗外於風今別之為類風者又何足以盡三子之旨乎豫考六經中善行數變者莫如風也挾寒而為風寒挾暑而為風暑燥為風燥濕為風濕兼熱則成火兼鬱則類氣古昔類風止作風寒而不及招風取中之因冷熱虛實之變有非辛熱之可通治故諸子之論各明其因也所謂非風者是矯飾之辭耳何則凡外邪之中人皆由氣體先虛經曰邪之所湊其氣必虛且古之通稱風從汗散而不審虛極者難施辛散之藥恐泄其真氣愈虛其虛是以東垣發氣本之論俾學者知風因虛而中當分虛實以治又風雖為涼氣若因火熱自甚肝風燥動腠理疏豁風乘熱中從火為邪豈可例用辛溫是以出火熱之論深知世俗止知風末而不知有火邪之本也又東南二地素鮮烈風寒雖風不易中間有中者悉皆火熱內盛因虛而致非若北地常有大風甚寒人體略虛衣或單薄純被風寒逼中也是以丹溪深韙河間之説以西北真為風所中者有之東南之人多由痰熱生風也風本無意中人人自取於風也故風本一邪有內外出入寒熱虛實之異諸子各摛精論何嘗外於真風而別為類風哉但當以古論為風寒邪實外至之證是天致病於人也三子論為痰熱氣虛內致之因是人取病於天也本乎外者內輕而外重取法於古因於內者內重而外輕始從三子定中風論中風證治論風之為病最易誤治誤治者在不明其表裡耳蓋外風者八方之所中內風者五臟之本病也八方自外而入先有發熱惡寒頭痛身痛之證此因於外者顯然有可察也五風由內而病則絶無外證而忽病如風其由內傷可知也然既非外感而經曰諸暴強直皆屬於風諸風掉眩皆屬於肝何也蓋肝為東方之臟其藏血其主風血病則無以養筋筋病則掉眩強直之類諸變百出此皆肝木之化故云皆屬於風謂之屬者以五氣各有所主如諸濕腫滿皆屬於脾之類其義同也蓋有所中者謂之中外感也無所中者謂之類中內傷也故王安道有類中真中之辨後世不明此義不惟以類風者認為真風而且以內奪暴厥等證俱認為風誤亦甚矣夫外盛者邪襲肌表故多陽實內傷者由於酒色勞役七情口腹致傷臟氣故多陰虛凡臟氣受傷脾虛者病在四肢或多痰飲腎病者或如在髓或在二陰心病者或在血脈或在神志肺病者或在營衛或在聲音肝病者或在筋瓜或在脅肋故東垣曰有中風卒然昏憒不省人事者此非外來之邪乃本氣自病也夫人生於陽而根於陰凡陽虛則氣衰耗故病在元神神志為之昏亂陰虧則則形體壞病在精血故肢體為之廢弛俗以神離形壞之證不求根本之虛而以風治鮮不危矣然外感者非云絶無虛證氣虛則虛也內傷者非曰必無實證有滯則實也治虛者當察其在陰在陽而直補之治實者當察其因痰因氣而暫開之此於內傷外感虛實攻補之間最當審其有無微甚而配其治也甚至有元氣素弱猝然仆倒上無痰下失禁瞋目昏沉此厥竭之證尤與風邪無涉使非大劑參附或七年之艾破格挽回又安望其復真氣於將絶之頃哉倘不察表邪不辨虛實但以之為名多用風藥不知風藥皆燥燥復傷真陰風藥皆散散復傷元氣以內傷為外感以不足作有餘此促人之死也可不慎哉酒人多中風説按中風之證先哲皆尚論邪之所湊其氣必虛而未嘗言虛之所自乃後世輒指之曰某中風因少年曾多斫喪也某中風因高年尚有侍姬也以余視之房勞致虛者固衆而沉湎致虛者尤多蓋嘗歷治中風之人強半系善飲者亦大明驗也按內經云飲酒中風亦名酒風醫壘元戌云酒濕之為病亦能作痹證口眼斜歪半身不遂云云丹溪亦曰頭風之病多見於嗜酒之人頭風眩暈即中之漸也是知酒人多中洵不誣也蓋酒性溫散善解腠理衛虛則外邪易入酒氣濕熱能釀痰涎痰多則內風易動當少壯時血強氣雄不能為害中年以後經脈骨肉皆糟粕之味所積穀食漸減蒸胃腐腸雖或色澤榮華而中實敗壞譬之本根朽蠹未遇狂風耳丹溪論中風主濕與痰雖未嘗專指曲然致痰濕者莫盛於酒豈徒以衽席議虛哉若酒色並嗜之流又為雙斧伐木其僕可立而待不得獨冤狂樂矣痹證析微論痹者閉也皮肉筋骨為風寒濕氣雜感血脈閉塞而不流通也三氣之中一氣獨盛即能為痹也內經痹名甚多不能細數如雲風痹寒痹濕痹者指病之因行痹痛痹著痹者言病之狀脾肝心肺腎痹者言病之所屬筋脈皮肉骨痹者言病之所在故昔人云風寒濕氣所謂行痹痛痹著痹又以所遇之時所客之處而命其名非行痛著之外別有何脈之五痹也今世有憒憒者問及痹證輒曰此痛風之類耳亦不謬哉惟近代王損庵列證最為有見既以痹字提綱復分條而直斷之曰行痹者行而不定世稱走注疼痛之類是也痛痹者疼痛苦楚世稱痛風白虎歷節之類是也著痹者著而不移世稱麻木不仁之類是也又走注與歷節不同但支節疼痛未必流行也至於治痹之要治行痹者散風為主祛寒利濕仍不可廢大抵參以治血之藥蓋治風先治血血行風自滅也治痛痹者散寒為主疏風燥濕仍不可缺大抵參以補火之劑非大辛大溫不能釋其凝寒為害也治著痹者利濕為主祛風解寒仍不可少大抵參以補脾補氣之劑蓋土強可以制濕而氣自足自無麻頑也然痹而因三氣者治之宜然若邪郁病久風變為火寒變為熱濕變為痰即當易轍尋之以降火清熱溪痰為主參以通經活血流散邪滯之劑安可全作三氣治哉此義惟丹溪得之在內經原自有熱痹之證非鑿説也故凡痹而知痛知癢易治不紅不痛而痹者難醫又宜圖之於早遲則必至煩悶喘嘔肺傷上氣嗌乾腹滿心傷多飲數溲夜臥則驚肝傷尻以代腫脊以代頭腎傷四肢懈惰發咳嘔沫脾傷五臟證險而難愈矣外有胞痹腸痹周痹血痹支飲作痹等證仍當博考群書以求全旨痿論經曰神傷思慮則肉脫意傷憂愁則肢廢魂傷悲哀則筋攣魄傷喜樂則皮稿志傷盛怒則腰脊難俯仰所以筋攣不便之證為內因之病不可倒作風治然五痿論云有所失亡所求不得則肺熱葉焦皮毛枯燥而生痿躄名曰皮毛痿悲哀太甚則經絡絶名曰脈痿思慮無窮熱入於肝致出白淫名曰筋痿感於卑濕土氣傷脾致肌肉不仁名曰肉痿勞倦熱渴陽氣內乏熱舍於腎腰脊不舉甚則骨髓枯減名曰骨痿夫皮毛筋脈三痿固為內因而骨肉二痿又屬外感況生氣通天論云因於濕首如裹濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿觀此則痿亦有外感者矣丹溪以痹為外感風寒實邪痿為內因濕熱本虛愚謂痹乃正氣本和因外感之風寒冷濕為剛烈之邪當以有餘名之痿乃正氣本虛致成怫鬱懈惰之病為柔緩之邪當以不足名之故或因初感七情乃飲食厚味中焦鬱積淫氣不清濕熱乘虛而痿者有之或因初感濕痹郁久成熱氣血漸虛為痿者有之難以拘論也至於治法如濕勝者則有脾胃虛濕之證脈微而緩弱宜滲水燥土熱勝者則有內傷鬱熱之證脈虛而浮大宜益氣清熱此內經治痿獨取陽明之法也如肝腎精血虛而濕多者謂之正虛宜溫補精髓內雖有熱乃為虛熱補之自除若真火熱勝者謂之偏虛脈必沉數及兼遺精白濁陰火等證宜滋陰降火熱甚者宜服瀉火表劑以救肺熱此丹溪治痿瀉南補北之法也有用愈風湯健步丸以治濕熱相半之痿愚謂止可施於挾風之證若風邪甚者又為痹矣風痹痿論風者以病因而為名者也痹與痿以病形而為名者也夫風為六淫之長痹則三氣雜合故有以風痹同稱者因其病形之相似也痹與痿俱有筋骨皮肉脈五者之分又俱有氣血不行肌肉不仁四肢不用等證故有以痹痿同稱者因其病形之相似也至於風與痿則不可概而稱又不可概而治此丹溪所以斥局方之非正千古之誤而徐彥純特分風痿為二門有功於來學不小雖然寧獨風與痹不可混即風證與痿皆不可混如風證之四肢不用分左癱為血虛為痰右瘓為氣虛有痰痹證之四肢不用乃濕土化重著不移傷於風則陽受之感於風寒濕則陰受之是風與痹之不可混而稱亦不可混而治也痹者三氣雜至為外來有餘之邪法當疏風散寒利濕為主則氣行血順而愈痿則積虛內熱而後病及於臟為內生不足之證法當獨取陽明或兼瀉南補北則氣升血旺而愈是痹於痿之不可混而稱亦不可混而治也然則三者既不可混將安別之亦在夫脈與證相參而已如因中風卒倒之後以至半身不遂或手足不隨兼有痰不語口眼歪斜等證雖有氣虛血虛之分然留而不去其病則實此風證也其脈必浮而滑如因汗出當風坐臥卑濕涉水沖寒以至骨節疼痛皮膚不仁肢體重著四肢緩縱引急等證雖與風證同系外邪然引痛重著自有三者之狀此痹證也其脈必緊而澀如因七情勞役酒色無節既非沖寒受濕之邪又無卒倒暴厥之證日漸痿疲而至精枯髓減筋骨痿弱緩縱不收此痿證也其脈必虛而數明乎此則三證之不可混洞若觀火又安得有混治之誤哉厥論厥者手足逆冷陰陽不相接之謂也凡陰虛而不接者則溫之陽陷伏而不相順者則下之熱邪入而未深者則散之皆四肢逆冷之厥也至於內經厥意則不然以足三陰起於足趾之端足三陰聚於足心之下若陽氣盛則陰氣虛陽乘陰位故熱厥必從足下始而陰虛之病足心多熱也若陰氣勝則陽氣虛陽不勝陰故寒厥必起於足五指而不行於膝其寒非從外入皆由內生所以陽虛之證四肢多不溫也論得寒厥之由則謂其人自恃質壯於秋冬陰盡之時縱欲以奪精精虛於下寒氣因而上逆陽衰不能滲營其經絡而手足寒也論得熱厥之由則其人醉飽入房酒谷之氣相薄耗竭真元脾腎之陰傷於內元陽無制而手足熱也夫陰陽內外各有所司陽主表其氣溫陰主裡其氣寒表裡之脈循環相接於四肢故舉傷於酒色以陰陽二厥之大者為例著於篇首續序十二經病形皆不言手足之厥亦不及受病之因謂二例在前可因此而推之故葉氏曰內經所謂寒熱二厥乃陰陽氣逆而為虛損之證寒厥補陽熱厥補陰正合王太僕壯水之主以制陽光益火之源以消陰翳之法仲景河間安道所論乃傷寒手足之厥冷也證既不同治法亦異可稱明辨他如煩勞過度陽氣必張陰精內竭積至於夏則為煎厥大怒傷肝形氣暴絶血菀於上則為薄厥亦名氣逆二陽一陰發病則為風厥五絡俱竭或飛尸鬼擊卒然中惡則為尸厥惡血衝心則為血厥痰涎迷悶則為痰厥因醉得者則為醉厥因飽得者則為食厥此皆卒中暴僕之厥也外有骨枯爪痛為骨厥身立如椽為骭厥漏而強直為陽明厥長蟲吐出為蛔厥與夫厲頭痛厥心痛厥腰痛厥疝痿厥痹厥腳氣厥等此因有逆氣而名厥者也學者詳其治以施之風厥辨內經風厥並陳後世不察概以卒倒暴厥之急候名為中風僅以手足逆冷則名為厥抑何顛倒之甚也經云暴厥者不知與人言又云血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死又云手足少陰太陰足陽明五絡俱竭令人身脈俱動而形無知其狀若尸或曰尸厥觀此則不但手足之謂辨之之法靜而不搐者為厥動而伸搐者為風脈微身冷者為厥脈浮身暖者為風風為邪氣有餘病多經絡之受傷厥為正氣不足或挾氣食卒倒純系外邪病形俱實者乃為中風氣衰邪犯形虛病實者即名風厥絶無外邪形病俱虛者是名暴厥又若因氣因食因邪祟暴僕之證既可名中氣中惡中食亦可名氣厥食厥尸厥也如此則經旨彰明風厥有別而從來類中風證紛紛辨喙可息矣傷寒約法從李念莪刪本傷寒一法變態不測其中立言之善無出仲景用藥之善須遜節庵其於曲折之微靡不詳盡余復何言然猶有不能已於言者在於條目之洪繁而後學求之不易也陶節庵曰得其綱領易如拾芥脈證與理而已求之多歧則支離破碎如涉海問津矣脈證者表裡陰陽虛實寒熱也理者如其常通其變也多歧者蔓衍之方書也余有感於斯言約六法以盡之曰汗吐下溫清補汗者治其表也而汗法有三一曰溫散寒勝之時陰勝之臟陽氣不充則表不解身雖有大熱必用辛溫一曰涼解炎熱熾盛表裡枯涸陰氣不榮亦不能汗宜用辛涼一曰平解病在陰陽之間既不可溫又不可涼但宜平用期於解表而已吐者治在上也吐中有發散之意可去胸中之實經曰在上者因而越之是也下者攻其里也而下法有五痞滿在氣燥實在血四證具者攻之宜峻也但見滿燥實者攻之稍緩但見痞實者攻之更緩或行血蓄或逐水停輕重緩急隨證變通也溫者溫其中也臟有寒邪不溫則死夫氣為陽氣虛則寒故溫即是補又名救里者以陽虛可危急當救里也清者清其熱也有熱無結本非下證若不清之熱何由散下後餘邪亦宜清之補者補其虛也古人言之已詳今人畏而不用使傷寒犯虛者坐而待斃大可憾也如屢發而汗不解陰不能達也人知汗屬於陽升陽可以解表不知汗生於陰滋陰可以發汗也又如內熱不解屢清火而不退陰不足也人知寒涼可以退熱不知壯水可以清火又如正虛邪熾久而不痊補正則里自除溫中則邪自散此必見衰微之陰脈者也傷寒論曰陰證得陽脈者生陽證見陰脈者死人皆奉其言未知釋其義夫正氣實者多見陽脈正氣者多見陰脈證之陽者假實也脈之陰者真虛也陳氏曰凡察陰證不論熱與不熱惟憑脈用藥是為穩當不論浮沉大小但指下無力重按全無便是伏陰然則沉小者人知為陰脈而不知浮大者亦有陰脈也是則傷寒雖有萬變虛實二字可以提綱正勝則愈邪勝則死正氣實者雖感大邪其病亦輕正氣虛者雖感微邪其病亦重氣實而病者攻之即愈雖不服藥經盡亦安何足慮也所可慮者惟挾虛耳奈何庸淺之輩不察虛實但見發熱動手便攻虛而攻之無不死者且曰傷寒無補法謬之甚矣獨不觀仲景三百九十七法而治虛寒者一百有奇垂一百一十三方而用人參附桂八十有奇東垣丹溪節庵亦有補中益氣回陽返本溫經益元等湯未嘗不補也而謂傷寒無補法可歟論六經無再傳傷寒傳變邪熱漸入而六經以次受之六經傳盡無出而再傳之理也欲知其傳之始末先別人身六經足太陽為三陽最在外陽明為二陽在太陽內少陽為一陽在陽明內此三陽為表也皆由內以數至外故一二三之次第如此傷寒由表入里邪氣漸以深傳六七日厥陰也此論其常耳變則不可拘於次第拘於日數其傳至厥陰為傳經盡再不復傳成氏曰六曰厥陰傳經盡七日當愈七日不愈者謂之再傳言再自太陽傳至厥陰謂傳經盡十三日當愈十三日不愈者謂之過經謂再過太陽經以次而傳也謬矣馬仲化曰自太陽以至厥陰猶人由戶登堂入室厥陰復出而傳於太陽奈有少陰太陰少陽陽明以隔之豈有遽出傳於太陽之理此斥再傳之非誠千古斷案惜乎釋七日病衰猶有未明使後人於傳經不無障蔽耳然則邪氣之入果無由里而出於表者乎其在太陽篇曰欲自解者必當先煩乃有汗而解何以知之脈浮故汗出欲解也此以脈浮知邪氣還表知是向安之地不待更用湯藥邪自外散者散則復何傳焉須知里邪不出則已出則欲愈非欲傳也或曰太陽篇云太陽病頭痛七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈此非一日至六日傳三陽三陽經至七日當愈不愈者則太陽之邪再傳陽明者歟曰傷寒始於太陽受病以次而終於厥陰為傳經盡諸經受病凡七日自愈者為行其經盡太陽病至七日頭痛自愈者以行太陽經盡也邪氣行來始終則在太陽一經而盡其七日當愈之數也太陽篇曰發陽者七日愈以陽數七故也若七日以上不自愈欲過太陽一經當針足陽明經迎而奪之使不傳陽明則愈玩其行經之句不曰傳經盡則仲景之意昭然矣成氏誤以行其經盡為傳遍六經則厥陰之邪再傳太陽太陽再傳陽明則宜厥陰未傳太陽之前預針太陽矣何必欲傳陽明而後針陽明哉或曰霍亂篇有曰十三日愈所以然者經盡故也此非傷寒傳變三陽三陰後六日再傳經盡十三日當愈者歟太陽篇有曰傷寒十三日不解過經譫語者以有熱故也當以湯下之此非十二日再傳經盡十三日不愈者謂之過經者歟如太陽行其經盡之謂也由太陽受病於一日至七日為行太陽經盡之理推之則諸經皆屈指而期矣陽明受病於二日至八日自愈者謂行陽明經盡少陽受病於三日至九日自愈者為行少陽經盡卻四五日至三陰上次第至十二日自愈者為行厥陰經盡十三日當大氣皆去精神爽慧之期也故曰若過十三日不間尺寸陷者為大危其曰十三日不解過經譫語者正以當解之期不解乃過於經而入於裡此為內實而熱結於裡也當以湯下之此泛言過經不專指何經者也何嘗有再傳經盡謂之過經之旨哉詳考過經之意或有言過太陽經成里證者或有專言過太陽經者或有泛言過太陽經者可引而證之陽明篇曰汗出譫語者以有燥屎在胃中此為風也過經乃可下之蓋謂燥屎在胃中而譫語者其風邪在表而汗出其燥屎在胃中而當下須過太陽經無表證而結於裡乃可下之此言過太陽經而成里病者也果如成氏十三日再傳經盡謂之過經則燥屎在胃乃待十三日乃可下之乎於此則注曰須過太陽經無表證乃可下之則無再傳經盡謂之過經者相矛盾也太陽篇曰太陽過十餘日及二三下之後四五日柴胡證仍在者先與小柴胡湯蓋謂太陽經無太陽表證也然里證未具者未如下及二三下之後四五日當有少陽柴胡證者須與小柴胡湯此則專言過太陽經者也霍亂篇曰下痢後當便鞭能食者愈今反不能食服則復過一經過一經能食過一日當愈不愈則不屬陽明也此承上文言下痢霍亂後亡津液而便硬硬而能食者愈屬陽明胃氣和也今反不能食傳入後一經中頗能食是復過一經能食矣此暴熱使之能食非陽明胃氣和也此泛言過經者也何嘗有再傳經盡謂之過經之旨哉況邪傳六經豈有三度之理朱氏釋仲景書闡明奧旨惠及後世多矣猶於傳經少達乃至穿鑿之甚蘊要祖成氏之注其過經不解例注曰經言傷寒十三日不解謂之過經仲景焉有此話是以成注為經矣其六經傳變論又曰過經不解乃為壞病夫仲景所謂壞病者言為逆犯所壞也蘊要之説訛上之訛也陶尚文曰傷寒汗不愈而過經其證尚在而不除者亦溫病也更不可曉論寒證無傳經太陽篇曰無熱惡寒者發於陰也此言寒邪直中陰經之寒證也始終則在一經非若熱證之傳經者也人傷於寒者自表而始則皮膚受傷陽氣不能伸越乃鬱而成熱是為發於陽之熱證表邪不解則以次而傳經若夫非表始而直入於陰經不由陽鬱熱而來初起便手足厥冷或惡寒伴倦成無熱惡寒之證始於陰經是為發於陰之寒證三陰所見雖有吐痢語證稍異如自利不渴屬太陰自痢而渴屬少陰之類皆起於無熱惡寒乃其常耳惟少陰有始得之反發熱脈沉者以罕有是證故語其變而曰反也然則發於陰經之寒證豈可與發於陽經之熱證並論哉熱證屬陽寒證屬陰陰陽動靜造化自然陰寒直入只在一經無傳之理何成氏昧於此謂其從太陽始亦以次而傳變六經且以再傳三傳推之有是理乎少陰篇曰少陰病脈微細但欲寐者陰主靜也乃注曰邪氣傳裡深也若此之類無始得便厥之文蓋誤認為熱證無惑乎傳裡之説也厥陰篇曰傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為凶也夫先厥四日者寒邪直入厥陰陰勝也熱後三日陽氣欲復耳非變為傳經之熱證也復厥五日者陰氣勝陽陽不能復故曰病進乃注曰先厥四日卻熱三日七日傳經盡當愈若不愈而復厥者再作傳經蓋再從太陽傳裡之謂也陽經受病必鬱而成熱有先厥者乎靈樞曰邪之中人或中於陰或中於陽何嘗必自太陽始耶蓋因其或寒或熱不知始終只是厥陰證亦無惑乎傳經之失也至若辨脈篇曰其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇注曰沉遲陰結也不能食身體重陰證也陰病見陰脈則當下今大便硬者為陰氣結陽不得而雜之是名陰結成氏知其寒證為純陰矣而復以傳經至再三釋之夫既為陰氣結固則結固於里者能出而傳之表乎不可下篇曰無陽陰強大便硬者必清穀腹滿此即陰結之寒證也成氏亦注曰陰強者寒多陰結即裡寒之證其有傳經者哉總由不知傷寒有直入三陰之寒證又不知寒邪與熱病大不相同其意混謂中寒則必傳經故雖知寒氣勝而先厥者概以自表而傳論之三陰注釋誤者紛紛立言垂訓之士胡為若此學者明於取捨始得尚友之道矣訛稱陰證辨人傷於寒有陰陽二證陽證不具論中所謂陰證者傳經之陰證即三陽熱病以次及於三陰而見腹滿咽乾口燥渴煩滿囊縮諸證是也有直中之陰證乃寒邪不由陽經直入三陰而來無熱惡寒唇青舌卷厥冷自痢等證是也有傳陽變陰之陰證即陽病汗下太過真氣虛脫或病中不慎保攝失宜以致熱邪變寒亦如直中陰經之證是也舍二者無所謂陰矣乃今吳下俗傳凡系人房後而感寒邪輒名證陰殊屬不解若乃男因女而得曰陰則女因男而得者當名陽證矣夫既有訛稱則必誤治而投溫補之劑設令其人陽虛感邪猶有邪得補而愈甚之誤若精虧火旺與熱邪並熾者其誤可勝言哉使房勞受寒謂之邪乘虛入則可直曰陰證則不可也誤稱之害小誤治之害大不得不辨釋六經七日病愈六經以漸受病其愈皆以七日為期陽數七故也傷寒例曰其不兩感於寒者更不傳經不加異氣者至七日太陽病衰頭痛少愈八日陽明病衰身熱稍歇九日少陽病衰耳聾漸聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也此論六經七日病愈本諸素問論熱篇彼此注釋者皆不能無誤皆未明也敢釋之曰其者指傷寒也不兩感於寒者不是一日並傳陰陽二經也更不傳經者邪在此經更不傳彼經也不加異氣者傷寒病熱不重感寒感風感濕感溫熱而變他病也夫如是則可期六經病愈日期矣太陽篇曰發於陽者七日愈以是數計之乃知六經之病自一日受者七日當衰二日受者至八日衰亦是七日之數也故七日邪在太陽幸而更不傳陽明更無變證則至七日太陽病衰頭痛少愈如或二日邪受陽明更不傳變至八日而陽明病衰身熱少愈又或邪受少陽更不傳變至九日少陽病衰耳聾微聞如四日邪傳少陰更不傳變至十一日少陰病衰渴止舌乾已而嚏又或六日邪傳厥陰傳經盡而更不傳變至十二日厥陰病衰囊縱少腹微下也大氣皆去病人精神爽慧此二句總承六經而言如言或傳或不傳當病衰時則皆大氣去而精神慧也成氏注曰六經傳變則與更不傳經之説背矣素問馬氏注七日之際巨陽病衰頭痛少愈正以初時所感之邪太盛既以二日傳之陽明矣而其未盡傳者何在太陽至此而比之一日之際少愈焉六日傳至厥陰而其未盡傳者尚在少陰至十二日比之六日之際少愈焉如果傳至陽明由此而傳之厥陰當六日之時前之邪氣未盡傳者俱如太陽之尚在頭痛以至囊縮諸證紛紜甚於兩感矣七日之際焉得不死反曰病衰乎況太陽受病若必傳變六經則二日陽明三日少陽本經猶有頭痛至四日傳太陰太陰經不至頭當腹滿咽乾之時不得有頭痛矣何必至七日而頭痛少愈也或曰太陽傳陽明其未盡傳者尚在太陽豈無是證歟曰有之是太陽陽明並病之證也若釋太陽證衰而傳之陽明如此則非矣由歧伯無更不傳經不加異氣二句而馬氏注素問遂失合仲景之意耳或曰所謂更不傳經者謂六經傳遍七日當再傳太陽也噫此因成氏注釋之謬後世有是説耳然已辨之詳矣或曰子謂更不傳經如曰太陽更不傳陽明者有據乎太陽篇曰傷寒一日太陽受之脈若靜者謂不傳也少陽篇曰傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也是皆當傳不傳者也雖仲景此篇似有可疑曰頭痛少愈身熱少歇耳聾少聞少腹微下是病衰而未全愈也曰腹減如故渴止舌乾已大氣皆去而後為全愈也六經病衰與愈何不同歟要之仲景之論本之素問學其大體而已即六經病衰之期寧無先之者乎後之者乎傷寒原不以日數拘也況傳經六日至於囊縮危且急矣得至十二日病衰而囊縱者不可以為常也學者當以圓通得之溫病熱病解原病集傷寒者以病因而為病名者也溫病熱病以天時與病形而為名者也由三者皆起於感寒或者通以傷寒稱之夫通稱傷寒者原其因之所自耳至於用藥不可以一例施也何也人之傷寒蓋於霜降後春分前天令嚴冷之時感而即發寒邪閉其腠理故非辛甘溫之劑不足以散之此仲景所以桂枝麻黃等湯之必用也溫病熱病在霜降後春分前感不即發寒邪伏於肌肉至春夏天令暄熱之時怫然自內達外郁其腠理無寒在表此非辛涼之劑不足以解之此桂枝麻黃等湯之所以不用也而後人所處沖和湯通解散解肌湯調和表裡者之所以可用也夫即病之傷寒有惡風惡寒之證者風寒在表而表氣受傷故也後發之溫病熱病有惡風惡寒之證者重有風寒新中而表氣亦受傷故也若無新中之風寒則無惡風惡寒之證即間有之亦因病人表氣本虛熱達於表又重傷表氣故不禁風寒非傷風惡風傷寒惡寒但衛虛則惡風營虛則惡寒耳故仲景曰太陽病發熱而渴不惡寒者為溫病不惡寒則病非外來渴則明其熱自內熾溫病如此則熱病可類推矣凡不渴而惡寒者非溫病熱病明矣然溫病熱病亦有先見表證而後入里者由怫鬱自內達外熱鬱腠理不得外泄遂還里而成可攻之證非如傷寒從表而始也或者不悟此理乃於春夏溫熱病而求浮緊之脈不亦疏乎不知緊為寒脈有寒邪則見之無寒邪則不見也豈其本然哉又或者不識脈形但見弦便呼為緊斷為寒而妄治蓋脈之盛而有力者每每見弦豈可錯認為緊而斷為寒夫溫熱病之脈多在肌肉之分而不甚浮且右手反甚於左手誠由怫鬱在內故也其或左手盛或浮者必有重感於風寒否則非溫熱病暴感風寒之病耳凡溫熱病苦無重感表證雖見而裡熱為多故不渴者少治法當以清熱為主而解表兼之亦有治里而表自解者余每見世人治溫熱病或誤攻其里猶無大害誤發其表變不可言此足以明其熱之自內達外矣其間有誤攻裡而致大害者乃春夏暴寒所中之疫證邪純在表未入於裡故也寧可與溫熱同論哉夫惟世以溫熱病混稱傷寒故每混寒熱二字以求浮緊之脈以用溫熱之藥又方書多混稱四時傷寒每以春夏之溫熱病與秋冬之傷寒一類治之而無別不知秋冬之傷寒真傷寒也春夏之傷寒疫病也與溫病自是兩塗豈可同治況傷寒之有直傷陰經與太陽雖傷不及鬱熱即傳陰經為寒證而當溫者又與溫熱大不相同其可妄治乎或者知一不知二謂仲景發表之藥今不可用而攻裡之藥乃可用嗚呼其可用不可用之理果何在耶彼時行不正之氣所作及重感異氣而變者又當觀其何時何氣參酌傷寒溫熱之法損益而治之尤不可例以仲景即病傷寒之藥通用也辨正風溫溫瘧溫毒溫疫內經云冬傷於寒春必病溫又云冬不藏精春必病溫此論熱溫病之大原也傷寒論云太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期此論溫病之大勢也自王叔和論溫條中有風溫溫瘧溫毒溫疫四變之説而其旨反晦蓋冬傷於風至春始發為風溫冬傷寒至春始發為溫病其理一也觀仲景於溫字上加一風字正以別夫傷於寒者耳汗後身反灼熱脈陰陽俱浮身重多眠睡鼻息必鼾語言難出一一盡顯傷風之因則不可復從溫病之傷寒施治矣故溫為怫鬱自內達外不可發表風溫為衛虛自汗更不可發表即誤下亦致表邪內陷誤火亦致外助溫氣皆為促其死亡後人不察惜其有論無方詎知森森治法全具於傷風傷寒證中正賴後人之因時設施乎叔和不究精微之用謂風溫即是溫病之變不知仲景正特出手眼處見冬不藏精之人兩腎間先已習習生風得溫風相召而病發於春溫病中之風溫亦猶冬寒證之有傷風也後世喻嘉言別其重感重變之誤誠為卓識但謂溫病發於太陽經風溫中於少陰經誤之甚矣風溫如果中於少陽則下之必致死亡熏之必得少解焉有初起反發熱脈浮誤下止便不利誤火則一逆再逆哉至若溫瘧者因冬不藏精邪本輕淺故止成瘧寒熱時發時止非外感之正病也內經云溫瘧得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗俱出此病藏於腎其氣先從內出之於外名曰溫瘧可見溫瘧為冬不藏精故風寒得以入腎又見溫瘧遇溫尚不易發必大暑大汗始發之也叔和以重感於寒立説豈其不讀內經乎又如溫毒者因久病不解熱邪熾甚亦溫病中之一病也溫證之有溫毒亦如傷寒之有陽毒陰毒耳仲景不以傷寒中之寒毒另有一證叔和何得以溫病中之溫毒別立一名更如溫疫因時下另感一氣乃溫病而加時加疫又非溫證之比矣其辨詳於喻氏溫疫論中溫疫論聖王御世春無愆陽夏無伏陰秋無悽風冬無苦雨乃至民無夭札物無疵癘太和之氣彌滿宇宙安有所謂溫疫哉然而周禮儺以逐疫方相氏掌之則溫疫之由來久矣古人元旦汲清泉以飲芳香之藥上已採蘭草以襲芳香之氣重滌穢也後漢張仲景著傷寒論欲明冬寒春溫夏秋暑熱之證自不能併入疫病以混常法然至理已畢具於脈法中叔和不為細繹乃謂更遇溫氣變成溫疫又謂春應溫而反大寒夏應熱而反大涼秋應涼而反大熱冬應寒而反大溫非其時而有其氣是以一歲之中長幼多病相似者此時行之疫氣也又謂從春分節以後至秋分節以前天有暴寒皆為時行寒疫是皆使人不能無疑者耳蓋四時不正之氣感之者因而致病初不名疫也因病致死病氣尸氣混合不正之氣斯為疫矣以故雞溫死雞豬溫死豬牛馬溫死牛馬推之於人何獨不然凡飢饉兵凶之際人體虛乏所以溫疫病盛行大率春夏之交為尤甚因溫暑溫熱之氣交結互蒸人在其中無隙可避故沿門合境受之者無不渾身壯熱眩暈嘔逆病如一類況乎共室連床邪穢尤易相親尸蟲載道呼吸即能相染哉是以盛夏溫熱之病即藏濕熱在內一人受之即為濕溫一方遍傳溫為疫也然世俗所稱大頭瘟者頭面腮頰腫如瓜瓠是也蝦蟆瘟者喉痹失音頸節脹大是也瓜瓠瘟者胸脅高起嘔汁如血是也疙瘩瘟者遍身紅腫發塊如瘤者是也絞腸瘟者腹鳴乾嘔水泄不通是也軟腳瘟者便清泄白足重難移是也小兒痘疹尤多以上疫證倘不明治法咸委之劫運謂非醫者之罪耶觀仲景於平脈篇中雲寸口脈陰陽俱緊者法當清邪中於上焦濁邪中下焦清邪中上故名潔也濁邪中下故名渾也陰中於邪內必栗也凡二百六十九字闡發奧理全非傷寒所有之事乃邪疫從入之門受病之總人自不識耳篇中大意謂人之鼻氣通於天故陽中霧露之邪為清邪從鼻息而上入於陽入則發熱頭痛項強頸攣正與俗稱大頭瘟蝦蟆瘟之説符也人之口氣通於地故水土之邪為飲食濁味從口舌而下入於陰入則人必先內栗足膝逆冷便溺妄出清便下重臍築揪痛正與俗稱絞腸瘟軟腳瘟之説符也然從鼻口所入之邪必先注於中焦以次傳布上下故中焦受邪因而不即治則胃中為濁營衛不通血凝不流其病變即在中焦俗稱瓜瓠瘟疙瘩瘟等證則又陽毒癰膿陰毒遍身青紫之類是也凡傷寒之邪先行身之背次行身之前由外廓而入故邪在表者汗之即散邪在裡者下之即解溫疫之邪則直行中道散漫三焦故雖表之不散攻之復合此疫證與傷寒表裡諸法所以略無干涉也治者於未病前先飲芳香正氣藥使邪不能入邪即入則以逐穢為第一義斯又得焉上焦如霧升而逐之中焦如漚疏而逐之下焦如瀆決而逐之各兼以解毒使營衛既通乘勢逐拔病安從奈我哉中暑中熱論潔古云靜而得之為中暑動而得之為中熱中暑為陰證中熱為陽證東垣云避暑熱於深堂大廈得之者名曰中暑其病必頭痛惡寒身形拘急肢體疼痛而心煩肌膚大熱而無汗是為房室之陰寒所遏使周身陽氣不能升越大順散主之若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發躁惡熱捫之肌膚大熱大渴引飲汗大泄無氣以動乃為天熱外傷肺氣蒼朮白虎湯主之余竊謂之不然蓋暑熱者夏之令也大行於天地之間或勞動或飢餓元氣虧乏不足以御天令亢熱於是受傷而為病名曰中暑亦名中熱其實一也今乃以動靜所得分之何哉夫中暑熱者因多在勞役之人勞役則虛虛則邪入邪入則病不虛則天令雖亢亦無由以傷之彼避暑於深堂大廈得頭痛惡寒等證蓋亦傷寒之類是耳烏得以中暑名之耶其所以煩心與肌膚大熱者由身中陽氣為陰寒所遏而作非暑邪也苟欲治之非辛溫發散之劑不可今乃以大順散治之吾恐不能解表反增內煩矣夫大順散一方原其初意本為冒暑伏熱引飲過多脾胃受寒濕而立故甘草薑皆經火制又用肉桂而非桂枝蓋溫藥也內有杏仁不過取其能下氣耳今世俗往往不明類曰夏日陰氣在內大順散必用之藥籲其誤也不亦甚歟夫陰氣非寒氣也以夏月陽氣發散在外故陰氣在內耳豈得治陰氣為寒氣而用溫熱之藥乎陰果為寒何以夏日則飲水乎其白虎湯雖宜用亦不可視為通行之藥必參之治暑諸方隨所見證而用之然後合理若所謂靜而得之之證雖當暑月原非暑證宜分出治之使後人勿致有似同而異之感附傷暑脈證論觀仲景論傷寒則知中暑中暍中熱同一夏令之病但其脈證有虛實耳何潔古強以動靜分暑熱而與夏日傷冷之病並稱乎此亦名不正矣大約暑之傷也勞苦多得之闈要云暑邪中太陽開腠理奪正氣若隨汗大泄邪不入里所謂精氣奪則虛而發熱者虛火是也脈當遲細宜扶正氣為主帶祛暑邪清暑益氣湯之類是也東垣又有血虛發熱證類白虎惟脈不長為辨此又似中暑而非中暑類傷寒又有類中暑辨不可不明治豈可不慎哉濕論濕者天地間陰陽蒸潤之氣也所感之由或因霧露之侵或因陰雨所客或因汗出沾衣為風所閼或因涉水行泥為寒所郁或因引飲過多或以卑濕之地有傷於皮肉筋骨或感頭面四肢尤多患於腰腳者蓋傷濕則下先受之也更喜侵於脾胃者以其同氣相感也大抵濕之為病感於寒則為寒濕兼於風則為風濕動於火則為濕熱逆於氣則為濕氣郁聚於中則為痰流注於下則為水入皮膚則為頑痹入氣血則為倦怠入肺則為喘滿入脾則為濕痰腫脹面目萎黃入肝則脅滿而四節不利入腎則腰痛胯痛身如板夾脅如沙墜入腑則麻木不仁入臟則肢體強直注於關節或腫或疼流於經絡難伸難屈滯於經脈則為腳氣等疾若內素有寒濕或初患浮腫等證又重感外濕以致內外交攻正氣衰竭卒倒無知似乎中風其脈沉澀細遲者即中濕也凡治者宜分其屬寒屬熱以施之濕熱者脈必洪數沉實證必溺赤口渴如水之瀦蓄而無從得出之故宜利小便為主即開溝渠以泄水之義也寒濕者脈必沉細緩弱證必倦怠濡泄如地雨泥而不能生物之象故用燥脾土為主猶用干灰以收泥濕之義也外如中濕者乃寒濕之甚陽氣衰微非參芍桂附等甘溫辛熱之劑不能治之又如積凍凝陰雨雪相繼而求開霽回春於和氣杲日之義也是以濕之為病所在皆有而人不知治者衆矣醫者宜審之霍亂證治論霍亂之治嘗考之內經有太陽所致為中滿霍亂吐下有土鬱之發民病嘔吐霍亂注下有歲土不及風乃大行民病霍亂餐泄有熱至則身熱霍亂吐下靈樞曰足太陽之別名曰公孫去本節後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則蠱脹有清氣在陰濁氣在陽營衛順行衛氣逆行清濁相干亂於腸胃為霍亂至巢氏病源因此一條乃云霍亂者由清濁二氣相干於腸胃間因遇飲食而變發則心腹絞痛挾風而實者發熱頭痛體疼虛則但心腹痛而已亦有因飲酒食肉腥膾生冷過多居處不節或露臥濕地或當風取涼冷風之氣歸於三焦傷於脾胃水穀不化皆成霍亂自巢氏之説行後世守之為法無復知有內經諸條者矣至河間云吐下霍亂三焦為水穀傳化之道路熱氣盛則傳化失常而吐瀉霍亂火性燥動故也世俗止謂是停食者誤也轉筋者亦是脾胃土衰熱氣燥爍夫筋則筋攣而動非寒也夫論病當從內經隨宜施治安可執一端而已哉張戴人則以風濕暍三氣合而為邪以脾濕土為風木所克鬱則熱乃發發則心火炎上故嘔吐嘔吐者暍也脾濕下注故注瀉注瀉者濕也風急則轉筋轉筋者風也可謂善推病情者乎海藏亦謂風濕熱外至生冷內加內外合病者此條殆似之矣然則此病當何以為要謂脾胃之濕為本諸邪感動者為病之由而其間脾胃有虛有實邪有陰陽相感之孰甚者皆宜消息處治至若明理論謂傷寒吐利者由邪氣所傷霍亂吐利者飲食所傷其有兼傷寒之邪內外不和加之頭痛發熱而吐利者是霍亂傷寒也原仲景之意豈必在飲食始為病哉由寒邪傳入中焦胃久因之不和陰陽否隔故得至此耳不然何以用理中四逆等湯治之然病有乾霍亂濕霍亂乾霍亂死者多濕霍亂死者少蓋濕者上吐下利則所傷之物得以出泄胸中水穀盡則止所以死者少乾者上不得吐下不得利則所傷之物不得出泄擁閉正氣乖隔陰陽煩擾悶亂喘脹而死者多矣嗟乎飲食有節起居有常寧有此證耶瘧疾證治論內經論瘧多以風寒暑濕為言然風與暑陽邪也寒與濕陰邪也得病之由多因夏傷於暑汗大泄腠理開發因遇夏氣悽愴之水寒邪先伏於皮膚及遇秋令而新涼束之則表邪不能外越於是乎陰欲入而陽拒之陽欲出而陰遏之陰陽相搏而病作矣其證大抵多熱多寒或單寒不熱或單熱不寒或先寒後熱或先熱後寒或有汗無汗或汗多汗少或頭疼骨痛大渴引飲或嘔吐不思食或煩躁不得眠或大便燥結或腹滿瀉利其淺者病在三陽能隨衛氣以為出入而一日一作其深者病在三陰則邪氣不能與衛氣並出故或間日一作或三四日作作愈遲者其病愈深是以瘧之輕重惟在陰陽淺深於本經則有寒溫疸瘧及六經五臟之分語無漏義矣丹溪復有食水痰飲敗血之別此不過瘧之兼證耳豈果因此而成瘧哉其外如瘴瘧者出嶺南瘴濕之地牝瘧者多生陽氣不足之人勞瘧者表裡氣虛因勞所發鬼瘧者本無瘧鬼邪氣亂神故治瘧者當察其邪之深淺證之陰陽必令其自臟而腑自里而表由陰而陽由晏而蚤引而散之升而舉之使邪氣得出自然和矣至於痰食血氣內寒內熱等證不過隨其甚者而兼治之弗得以此為主而兼補然邪在陽者取汗易邪在陰者取汗難又熱多者涼藥為靈寒多者溫藥為主其有外受風寒內傷生冷表裡俱虛則瘧痢並作者以瘧感由經痢感由藏但兼表裡而去其溫濕之本亦必漸愈也痢疾證治論痢疾即古所稱腸澼也自仲景而後又謂之滯下其所下者或赤或白或膿或血有痛者有不痛者有裡急後重者有嘔惡脹滿者有噤口不食者有寒熱往來者雖有變態多端終不外乎表裡寒熱而於虛實之辨更為切要若以表裡言之如經云春傷於風夏為飧泄腸澼又曰虛邪之中人也留而不去傳舍於腸胃之間多寒則腸鳴飧泄食不化多熱則溏出如糜是皆由於外邪即時氣相傳之屬也凡邪在表者必有表證但兼其表而行散之邪解而痢自愈如無表證則必由口腹悉屬內傷也但傷於內者極多因於表者間或有之此表裡之不可不辨也若以寒熱言之則古以赤者為熱白者為寒至劉河間非之如赤白相兼者豈寒熱俱盛於腸胃而同為痢乎蓋白者肺之色也青者肝之色也黃者脾之色也赤者心之色也至色黑而亦言為熱由火過熱反兼勝己之化故色黑也或言痢色青白為寒者誤也若果為寒則不能消穀何由反化為膿乎又曰若完穀不化而色不變吐痢腥穢澄徹清冷小便清而不澀身涼不渴脈遲細而微者寒證也凡消穀者無問痢色及他證便為熱也其言治曰苦能燥濕寒能勝熱或微加辛熱以佐之又曰行血則便膿自愈調氣則後重自除此皆河間之説也丹溪則引之曰赤利乃自小腸來白痢乃自大腸來皆濕熱為本自二子言出而後世莫違之雖二家方書非無從溫之治然亦不過備立言之缺略而其大意則專以濕熱為主今之醫家悉宗此訓一見痢證無分寒熱虛實或謂欲清其火非芩連不可欲去其積非硝黃不可欲行血者必用當歸延胡之類欲利水祛濕者必用五苓益元之類欲補中行滯者必用檳榔木香枳實之類欲和血涼血者必用丹皮白芍地榆之類朝夕更改不過如是及至臨危猶云濕熱未除積滯未消舉世皆然可勝其害愚見則大不然夫瘧痢疾發於夏秋本因溽暑豈云非熱但炎蒸之令本乎天也苟能順天之令焉得有病惟因熱求涼過於縱肆則病由乎人耳故凡風寒之中於外者其邪在經病多為瘧生冷之傷於內者其邪在臟病多為痢或表裡俱傷則瘧痢並作未有不中於寒而為瘧為痢者此致病之本其為寒為熱可知也若暑邪之郁久而成熱所以痢多熱證此固自然之理然有貪食瓜果過傷生冷未及鬱積隨觸而痢者豈是鬱熱耶又有素慎口腹或中雨水陰寒或因飲食之相犯皆能致痢是又何熱之有哉且凡病痢者必有膿血使無膿血焉得為痢蓋傷其臟腑之脂膏動其腸胃之脈絡故或寒或熱皆成膿血若謂膿血必因乎熱豈痢疾絶無寒證耶使必待完穀不化痢色不變及澄徹清冷等證始認為寒則其陽已盡去脾已盡敗幾於危矣豈無其漸而遽至是哉不知至此之由即寒證也矧痢因於濕生於土夫五行之理熱因火化寒因水化此陰陽之不易者也惟濕土寄旺於四者之中故從乎火則陽土有餘而濕熱為病從乎水則陰土不足而寒濕為病故但言濕熱而不去寒濕豈非醫家之誤乎至於以赤白分寒熱者是古法本不為謬而河間乃謂白者屬肺赤者屬心蓋謂白主乎氣赤主乎血亦近理也若以愚見言之則赤中未必無白白中豈必無赤赤白兼者豈其寒熱同病乎但其清濁微甚是有陰陽可辨耳雖赤痢亦有寒證然終是熱多白痢亦有熱證然終是寒多其有白而熱者則證脈必熱赤而寒者則證脈必寒亦易辨也若謂白必屬肺恐白痢非血化赤必屬心恐血痢不離乎氣此寒熱之不可不辨也再以虛實言之如頭痛身熱筋骨痠痛者表邪之實也脹滿惡食急痛拒按者里邪之實也舉按滑數往來有力者脈息之實也煩渴引飲喜冷畏熱者陽邪之實也舍此之外無可言實矣今有以口渴為熱者不知凡系瀉痢必亡津液液亡於下則津涸於上焉得不渴故當以喜熱喜冷分虛實也有以腹痛為實者不知痢出於臟則腸胃必有損傷膿血切膚焉得不痛故當以痛之緩急按之可否臟之陰陽腹之脹與不脹分虛實也有以小水之黃赤短為實熱者不知水從痢去溲必不長液以亡陰溺因色變故當以便之熱與不熱液之涸與不涸分虛實也有以裡急後重為實熱但知濕熱壅於大腸因而重墜不知氣陷則倉廩不藏陰亡則門戶不攝故當以病之新久質之強弱分虛實也若邪正不明禍如反掌此虛實之不可不辨也以治法言也則當求其所入之邪所受之臟以明致病之本其他所變皆為標也如因於濕熱者去其濕熱因於積滯者去其積滯因於氣者調其氣因於血者和其血新感而實者可以通因通用久病而虛者當以塞因塞用是皆常法無待言矣第見今人之病痢者虛常六七而治利者補無一二氣本陷矣而復行其氣後重不將甚乎中本虛矣而再攻其積元氣不將竭乎濕熱傷血自宜調血若過用推陳血愈傷矣津亡作渴自宜止渴若專於滲利津愈亡矣使必待血和痛止而後補則事已無及矣此無他本末未明但舉現在有形之疾病不知可慮者在無形之元氣也苟未省夫寒熱新久而一概混治其能免於虛虛實實之誤哉泄瀉九法論內經之言泄瀉或言風或言濕或言熱或言寒此明四氣皆能泄也又云清氣在下則生飧泄此明脾虛下陷之泄也統而論之脾土強者自能勝濕無濕則不瀉故曰濕多成五泄若土虛不能勝濕則風寒與熱皆得干之而為病其治法有九一曰淡滲使濕從小便而出如農人治潦導其下流雖處卑濕不憂巨浸經云治濕不利小便非其治也又云在下者引而竭之是也一曰升提氣屬於陽性本上升胃氣迫注輒爾下陷升柴羌葛之類鼓舞胃氣上騰則注下自止又如地下淖澤風之即干故風藥多燥且濕為土病風為木藥木可勝土風亦勝濕所謂下者舉之是也一曰清涼熱淫所致暴注下迫苦寒之劑用滌煩蒸猶溽暑伊鬱之時而商飈颯然倏動則炎熇如失矣所謂熱者清之是也一曰疏利痰凝氣滯食積所停皆令人泄隨證祛逐勿使逗留經云熱者泄之又云通因通用也一曰甘溫泄利不已急而下趨愈趨愈下泄何由止夫甘能緩急善禁急速且稼穡作甘甘為土味所謂甘以緩之是也一曰酸收瀉下有日則氣散不收無能統攝則注下何時而已酸之一味能助收攝之權經云散者收之是也一曰燥脾土德無慙水邪不溢故瀉者皆成於土濕濕皆本於脾虛倉廩得職水穀善分虛而不培濕淫轉甚經云虛者補之是也一曰溫腎腎主二便封藏之本位雖屬水真陽之火寓焉少火生氣火為土母此火一衰何以運行三焦熟腐水穀乎故積虛者必挾寒脾虛者必補母經云寒者溫之是也一曰固澀注瀉日久幽門道滑雖投溫補未克奏功須以澀劑久則變化不愆揆度合節所謂滑者澀之是也夫是九者治泄之大法業無遺蘊至於先後緩急之權豈能預擬臨證之頃圓機靈變可以胥天下並登於壽域矣腳氣論按腳氣之病自古無有稱之自晉蘇敬始其頭痛寒熱類傷寒而病起足膝腫病則與傷寒異其逆氣上行類風厥而痛甚乃至悶倒則與風厥異其兩足軟弱類痿痹而時發時止痛惟在足則與痿之一廢不復痹之無定所者異致此之由多因美飲醇醪上承濕熱之下注蹈寒涉水下吸清濕之上升兩者交成故名壅疾自東垣有南方腳氣外感清濕作寒治北方腳氣內傷酒乳作濕熱治之論致使後人泥之遂成南北兩派互相拘執不知北方縱無地之卑濕其冒雨露履汗襪與夫脫卸靴履汗出而風吹之致血凝於足豈不與南方卑濕同類盡屬外中者乎南方縱無潼乳之濕其酒食過多與臟腑所傳津液水穀停積於中而下注者豈不與北方潼乳之濕同類盡屬內傷者乎學者苟能圓通活變斯萬舉萬當矣
